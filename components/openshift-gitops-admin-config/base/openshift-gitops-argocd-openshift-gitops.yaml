apiVersion: argoproj.io/v1beta1
kind: ArgoCD
metadata:
  annotations:
    argocd.argoproj.io/sync-options: Delete=false,SkipDryRunOnMissingResource=true
  name: openshift-gitops
  namespace: openshift-gitops
spec:
  applicationSet:
    resources:
      limits:
        cpu: '2'
        memory: 1Gi
      requests:
        cpu: 250m
        memory: 512Mi
  controller:
    resources:
      limits:
        cpu: '2'
        memory: 4Gi
      requests:
        cpu: 250m
        memory: 2Gi
  rbac:
    defaultPolicy: ''
    policy: |
      g, system:cluster-admins, role:admin
      g, cluster-admins, role:admin
    scopes: '[groups]'
  redis:
    resources:
      limits:
        cpu: 500m
        memory: 256Mi
      requests:
        cpu: 250m
        memory: 128Mi
  repo:
    mountsatoken: true
    resources:
      limits:
        cpu: '1'
        memory: 1Gi
      requests:
        cpu: 250m
        memory: 256Mi
    sidecarContainers:
    - name: cmp-cluster-domain
      image: registry.redhat.io/openshift-gitops-1/argocd-rhel9@sha256:ddf6e5c439c6bfca31a7f25c22cffc5102092184a33b9754c97697f81c78e97a
      command:
      - /var/run/argocd/argocd-cmp-server
      securityContext:
        runAsNonRoot: true
      volumeMounts:
      - name: var-files
        mountPath: /var/run/argocd
      - name: plugins
        mountPath: /home/argocd/cmp-server/plugins
      - name: cmp-plugin
        mountPath: /home/argocd/cmp-server/config/plugin.yaml
        subPath: plugin.yaml
      - name: cmp-tmp
        mountPath: /tmp
      resources:
        limits:
          cpu: 500m
          memory: 512Mi
        requests:
          cpu: 100m
          memory: 128Mi
    volumes:
    - name: cmp-plugin
      configMap:
        name: cmp-plugin
    - name: cmp-tmp
      emptyDir: {}
  resourceExclusions: |
    - apiGroups:
      - tekton.dev
      clusters:
      - '*'
      kinds:
      - TaskRun
      - PipelineRun
  resourceHealthChecks:
  - check: |
      hs = {}
      if obj.status ~= nil then
        if obj.status.phase ~= nil then
          if obj.status.phase == "Pending" then
            hs.status = "Healthy"
            hs.message = obj.status.phase
            return hs
          end
          if obj.status.phase == "Bound" then
            hs.status = "Healthy"
            hs.message = obj.status.phase
            return hs
          end
        end
      end
      hs.status = "Progressing"
      hs.message = "Waiting for certificate"
      return hs
    kind: PersistentVolumeClaim
  - check: |
      hs = {}
      if obj.status == nil or obj.status.conditions == nil then
        hs.status = "Progressing"
        hs.message = "Waiting for status"
        return hs
      end

      local currentGen = obj.metadata.generation
      for i, cond in ipairs(obj.status.conditions) do
        if cond.observedGeneration == nil or cond.observedGeneration == currentGen then
          if cond.reason == "NoMatchingListenerHostname" then
            goto continue
          end
          if cond.type == "Programmed" and cond.status == "False" then
            hs.status = "Degraded"
            hs.message = cond.message or cond.reason
            return hs
          end
        end
        ::continue::
      end

      hs.status = "Healthy"
      hs.message = "Gateway is ready"
      return hs
    group: gateway.networking.k8s.io
    kind: Gateway
  - check: |
      hs = {}
      if obj.status == nil or obj.status.parents == nil then
        hs.status = "Progressing"
        hs.message = "Waiting for status"
        return hs
      end

      local currentGen = obj.metadata.generation
      for i, parent in ipairs(obj.status.parents) do
        if parent.conditions ~= nil then
          for j, cond in ipairs(parent.conditions) do
            if cond.observedGeneration == nil or cond.observedGeneration == currentGen then
              if cond.reason == "NoMatchingListenerHostname" then
                goto continue
              end
              if cond.type == "Accepted" and cond.status == "False" then
                hs.status = "Degraded"
                hs.message = "Parent " .. (parent.parentRef.name or "unknown") .. ": " .. (cond.message or cond.reason)
                return hs
              end
            end
            ::continue::
          end
        end
      end

      hs.status = "Healthy"
      hs.message = "HTTPRoute is accepted"
      return hs
    group: gateway.networking.k8s.io
    kind: HTTPRoute
  resourceTrackingMethod: annotation
  server:
    resources:
      limits:
        cpu: 500m
        memory: 256Mi
      requests:
        cpu: 125m
        memory: 128Mi
    route:
      enabled: true
  sso:
    dex:
      openShiftOAuth: true
      resources:
        limits:
          cpu: 500m
          memory: 256Mi
        requests:
          cpu: 250m
          memory: 128Mi
    provider: dex
