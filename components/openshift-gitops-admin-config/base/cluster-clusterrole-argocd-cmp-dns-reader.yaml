apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: argocd-cmp-dns-reader
rules:
- apiGroups:
  - ""
  resourceNames:
  - aws-creds
  resources:
  - secrets
  verbs:
  - get
- apiGroups:
  - config.openshift.io
  resources:
  - dnses
  - infrastructures
  verbs:
  - get
  - list
