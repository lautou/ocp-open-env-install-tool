apiVersion: v1
kind: ConfigMap
metadata:
  name: cmp-plugin
  namespace: openshift-gitops
data:
  plugin.yaml: |
    apiVersion: argoproj.io/v1alpha1
    kind: ConfigManagementPlugin
    metadata:
      name: cluster-domain-replacer
    spec:
      version: v1.0
      generate:
        command:
          - sh
          - -c
          - |
            set -e

            # Log start
            echo "[CMP] Starting cluster-domain-replacer plugin" >&2
            echo "[CMP] Working directory: $(pwd)" >&2

            # Kubernetes API credentials
            KUBE_TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
            KUBE_DNS_API="https://kubernetes.default.svc/apis/config.openshift.io/v1/dnses/cluster"
            KUBE_INFRA_API="https://kubernetes.default.svc/apis/config.openshift.io/v1/infrastructures/cluster"
            KUBE_SECRET_API="https://kubernetes.default.svc/api/v1/namespaces/kube-system/secrets/aws-creds"

            # Discover cluster domain from OpenShift DNS object using Kubernetes API
            echo "[CMP] Querying Kubernetes API for cluster DNS..." >&2
            BASE_DOMAIN=$(curl -s -H "Authorization: Bearer ${KUBE_TOKEN}" \
              --cacert /var/run/secrets/kubernetes.io/serviceaccount/ca.crt \
              "${KUBE_DNS_API}" | grep -o '"baseDomain"[[:space:]]*:[[:space:]]*"[^"]*"' | sed 's/.*"\([^"]*\)"/\1/')

            if [ -z "${BASE_DOMAIN}" ]; then
              echo "[CMP ERROR] Failed to query cluster DNS object from API" >&2
              exit 1
            fi

            # Discover AWS region from OpenShift Infrastructure object using Kubernetes API
            echo "[CMP] Querying Kubernetes API for cluster infrastructure..." >&2
            DISCOVERED_REGION=$(curl -s -H "Authorization: Bearer ${KUBE_TOKEN}" \
              --cacert /var/run/secrets/kubernetes.io/serviceaccount/ca.crt \
              "${KUBE_INFRA_API}" | grep -o '"region"[[:space:]]*:[[:space:]]*"[^"]*"' | sed 's/.*"\([^"]*\)"/\1/')

            if [ -z "${DISCOVERED_REGION}" ]; then
              echo "[CMP WARNING] Failed to query cluster region from API, using 'unknown'" >&2
              DISCOVERED_REGION="unknown"
            fi

            # Extract AWS credentials from kube-system/aws-creds Secret
            echo "[CMP] Querying Kubernetes API for AWS credentials..." >&2
            SECRET_JSON=$(curl -s -H "Authorization: Bearer ${KUBE_TOKEN}" \
              --cacert /var/run/secrets/kubernetes.io/serviceaccount/ca.crt \
              "${KUBE_SECRET_API}")

            # Extract base64-encoded values and decode
            DISCOVERED_AWS_KEY=$(echo "${SECRET_JSON}" | grep -o '"aws_access_key_id"[[:space:]]*:[[:space:]]*"[^"]*"' | sed 's/.*"\([^"]*\)"/\1/' | base64 -d)
            DISCOVERED_AWS_SECRET=$(echo "${SECRET_JSON}" | grep -o '"aws_secret_access_key"[[:space:]]*:[[:space:]]*"[^"]*"' | sed 's/.*"\([^"]*\)"/\1/' | base64 -d)

            if [ -z "${DISCOVERED_AWS_KEY}" ] || [ -z "${DISCOVERED_AWS_SECRET}" ]; then
              echo "[CMP WARNING] Failed to extract AWS credentials from kube-system/aws-creds secret" >&2
              DISCOVERED_AWS_KEY=""
              DISCOVERED_AWS_SECRET=""
            else
              echo "[CMP] Successfully extracted AWS credentials" >&2
            fi

            # Calculate domain values
            # COMPUTED_CLUSTER_DOMAIN: OpenShift routes domain (apps.BASE_DOMAIN)
            COMPUTED_CLUSTER_DOMAIN="apps.${BASE_DOMAIN}"

            # COMPUTED_ROOT_DOMAIN: Remove first subdomain from BASE_DOMAIN
            # Example: myocp.sandbox3491.opentlc.com → sandbox3491.opentlc.com
            COMPUTED_ROOT_DOMAIN=$(echo "${BASE_DOMAIN}" | sed 's/^[^.]*\.//')

            # Log discovered values (never log actual credentials!)
            echo "[CMP] Discovered BASE_DOMAIN: ${BASE_DOMAIN}" >&2
            echo "[CMP] Discovered REGION: ${DISCOVERED_REGION}" >&2
            echo "[CMP] Computed CLUSTER_DOMAIN: ${COMPUTED_CLUSTER_DOMAIN}" >&2
            echo "[CMP] Computed ROOT_DOMAIN: ${COMPUTED_ROOT_DOMAIN}" >&2
            if [ -n "${DISCOVERED_AWS_KEY}" ]; then
              echo "[CMP] AWS credentials available: YES" >&2
            else
              echo "[CMP] AWS credentials available: NO" >&2
            fi

            # Build manifests with kustomize and replace placeholders in output
            echo "[CMP] Building manifests and replacing placeholders..." >&2

            # Check if we're processing the CMP plugin itself (avoid self-corruption)
            if echo "$(pwd)" | grep -q "openshift-gitops-admin-config"; then
              echo "[CMP] Detected openshift-gitops-admin-config component, skipping placeholder replacement to avoid self-corruption" >&2
              kustomize build .
            else
              # Escape special characters in credentials for sed
              ESCAPED_AWS_KEY=$(echo "${DISCOVERED_AWS_KEY}" | sed 's/[\/&]/\\&/g')
              ESCAPED_AWS_SECRET=$(echo "${DISCOVERED_AWS_SECRET}" | sed 's/[\/&]/\\&/g')

              kustomize build . | sed \
                -e "s|CLUSTER_DOMAIN|${COMPUTED_CLUSTER_DOMAIN}|g" \
                -e "s|ROOT_DOMAIN|${COMPUTED_ROOT_DOMAIN}|g" \
                -e "s|CLUSTER_REGION|${DISCOVERED_REGION}|g" \
                -e "s|CMP_AWS_ACCESS_KEY_ID_PLACEHOLDER|${ESCAPED_AWS_KEY}|g" \
                -e "s|CMP_AWS_SECRET_ACCESS_KEY_PLACEHOLDER|${ESCAPED_AWS_SECRET}|g"
            fi

            echo "[CMP] Plugin execution complete" >&2
      discover:
        find:
          glob: "**/kustomization.yaml"
