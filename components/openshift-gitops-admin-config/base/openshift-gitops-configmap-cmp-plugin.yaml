apiVersion: v1
kind: ConfigMap
metadata:
  name: cmp-plugin
  namespace: openshift-gitops
data:
  plugin.yaml: |
    apiVersion: argoproj.io/v1alpha1
    kind: ConfigManagementPlugin
    metadata:
      name: cluster-domain-replacer
    spec:
      version: v1.0
      generate:
        command:
          - sh
          - -c
          - |
            set -e

            # Log start
            echo "[CMP] Starting cluster-domain-replacer plugin" >&2
            echo "[CMP] Working directory: $(pwd)" >&2

            # Kubernetes API credentials
            KUBE_TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
            KUBE_DNS_API="https://kubernetes.default.svc/apis/config.openshift.io/v1/dnses/cluster"
            KUBE_INFRA_API="https://kubernetes.default.svc/apis/config.openshift.io/v1/infrastructures/cluster"

            # Discover cluster domain from OpenShift DNS object using Kubernetes API
            echo "[CMP] Querying Kubernetes API for cluster DNS..." >&2
            BASE_DOMAIN=$(curl -s -H "Authorization: Bearer ${KUBE_TOKEN}" \
              --cacert /var/run/secrets/kubernetes.io/serviceaccount/ca.crt \
              "${KUBE_DNS_API}" | grep -o '"baseDomain"[[:space:]]*:[[:space:]]*"[^"]*"' | sed 's/.*"\([^"]*\)"/\1/')

            if [ -z "${BASE_DOMAIN}" ]; then
              echo "[CMP ERROR] Failed to query cluster DNS object from API" >&2
              exit 1
            fi

            # Discover AWS region from OpenShift Infrastructure object using Kubernetes API
            echo "[CMP] Querying Kubernetes API for cluster infrastructure..." >&2
            CMP_CLUSTER_REGION=$(curl -s -H "Authorization: Bearer ${KUBE_TOKEN}" \
              --cacert /var/run/secrets/kubernetes.io/serviceaccount/ca.crt \
              "${KUBE_INFRA_API}" | grep -o '"region"[[:space:]]*:[[:space:]]*"[^"]*"' | sed 's/.*"\([^"]*\)"/\1/')

            if [ -z "${CMP_CLUSTER_REGION}" ]; then
              echo "[CMP WARNING] Failed to query cluster region from API, using 'unknown'" >&2
              CMP_CLUSTER_REGION="unknown"
            fi

            # Calculate domain values
            # CMP_CLUSTER_DOMAIN: OpenShift routes domain (apps.BASE_DOMAIN)
            CMP_CLUSTER_DOMAIN="apps.${BASE_DOMAIN}"

            # CMP_ROOT_DOMAIN: Remove first subdomain from BASE_DOMAIN
            # Example: myocp.sandbox3491.opentlc.com → sandbox3491.opentlc.com
            CMP_ROOT_DOMAIN=$(echo "${BASE_DOMAIN}" | sed 's/^[^.]*\.//')

            # Log discovered values
            echo "[CMP] Discovered BASE_DOMAIN: ${BASE_DOMAIN}" >&2
            echo "[CMP] Discovered CMP_CLUSTER_REGION: ${CMP_CLUSTER_REGION}" >&2
            echo "[CMP] Computed CMP_CLUSTER_DOMAIN: ${CMP_CLUSTER_DOMAIN}" >&2
            echo "[CMP] Computed CMP_ROOT_DOMAIN: ${CMP_ROOT_DOMAIN}" >&2

            # Build manifests with kustomize and replace placeholders in output
            echo "[CMP] Building manifests and replacing placeholders..." >&2
            kustomize build . | sed "s|CLUSTER_DOMAIN|${CMP_CLUSTER_DOMAIN}|g; s|ROOT_DOMAIN|${CMP_ROOT_DOMAIN}|g; s|CLUSTER_REGION|${CMP_CLUSTER_REGION}|g"

            echo "[CMP] Plugin execution complete" >&2
      discover:
        find:
          glob: "**/kustomization.yaml"
