apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  name: cleanup-operator
rules:
- apiGroups:
  - ""
  resources:
  - namespaces
  - pods
  verbs:
  - delete
  - list
- apiGroups:
  - operator.openshift.io
  resources:
  - openshiftbuilds
  verbs:
  - delete
  - get
  - patch
- apiGroups:
  - operators.coreos.com
  resources:
  - subscriptions
  - clusterserviceversions
  verbs:
  - delete
  - list
  - get
