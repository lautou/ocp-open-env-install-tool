apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  name: cert-manager-operator
rules:
- apiGroups:
  - apiextensions.k8s.io
  resources:
  - customresourcedefinitions
  verbs:
  - get
- apiGroups:
  - operator.openshift.io
  resources:
  - certmanagers
  verbs:
  - delete
  - get
  - list
- apiGroups:
  - cert-manager.io
  resources:
  - clusterissuers
  verbs:
  - create
  - get
  - patch
  - update
- apiGroups:
  - config.openshift.io
  resources:
  - apiservers
  - dnses
  - infrastructures
  verbs:
  - get
- apiGroups:
  - config.openshift.io
  resources:
  - apiservers
  verbs:
  - patch
