apiVersion: batch/v1
kind: Job
metadata:
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-options: Force=true
    argocd.argoproj.io/sync-wave: "3"
  name: cleanup-installer-pods
  namespace: openshift-gitops
spec:
  template:
    metadata:
      name: cleanup-installer-pods
    spec:
      containers:
      - command:
        - /bin/bash
        - -c
        - "echo \"--- Starting Cleanup of Error Installer Pods ---\"\nTARGET_NS=\"\
          openshift-kube-controller-manager\"\necho \"Target Namespace: $TARGET_NS\"\
          \n\n# Find pods with 'Error' or 'Failed' status and label 'app=installer'\n\
          # We use awk to filter the output of 'oc get'\nPODS_TO_DELETE=$(oc get pods\
          \ -n \"$TARGET_NS\" -l app=installer --no-headers | awk '$3 ~ /Error|Failed/\
          \ {print $1}')\n\nif [[ -z \"$PODS_TO_DELETE\" ]]; then\n  echo \"✅ No pods\
          \ found in Error/Failed state. Nothing to clean up.\"\nelse\n  echo \"⚠️\
          \  Found the following failed pods:\"\n  echo \"$PODS_TO_DELETE\"\n  \n\
          \  echo \"--- Deleting Pods ---\"\n  # Convert newlines to spaces for the\
          \ delete command\n  for pod in $PODS_TO_DELETE; do\n    echo \"Deleting\
          \ pod: $pod\"\n    oc delete pod \"$pod\" -n \"$TARGET_NS\"\n  done\n  \n\
          \  echo \"✅ Cleanup complete.\"\nfi\n"
        image: registry.redhat.io/openshift4/ose-cli:latest
        name: cleanup
      nodeSelector:
        node-role.kubernetes.io/infra: ''
      restartPolicy: Never
      serviceAccountName: cleanup-operator
      tolerations:
      - key: node-role.kubernetes.io/infra
        operator: Exists
