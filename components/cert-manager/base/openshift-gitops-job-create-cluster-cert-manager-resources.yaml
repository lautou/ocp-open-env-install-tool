apiVersion: batch/v1
kind: Job
metadata:
  annotations:
    argocd.argoproj.io/sync-options: Force=true
  name: create-cluster-cert-manager-resources
  namespace: openshift-gitops
spec:
  template:
    metadata:
      name: create-cluster-cert-manager-resources
    spec:
      containers:
      - command:
        - /bin/bash
        - -c
        - "set -e\n\n# --- Helper Functions ---\n\nwait_for_crd() {\n  echo -n \"\
          Waiting for the cert-manager CRD...\"\n  until oc get crd certmanagers.operator.openshift.io\
          \ &>/dev/null; do\n    echo -n \".\"\n    sleep 5\n  done\n  echo \" CRD\
          \ established.\"\n}\n\nwait_for_initial_cr() {\n  echo -n \"Waiting for\
          \ the initial CertManager 'cluster' CR...\"\n  until oc get certmanager\
          \ cluster &>/dev/null; do\n    echo -n \".\"\n    sleep 5\n  done\n  echo\
          \ \" Initial CR found.\"\n}\n\n# Robust apply function that retries indefinitely\n\
          apply_with_retry() {\n  local description=$1\n  local yaml_content=$2\n\
          \  \n  echo \"--- Applying $description ---\"\n  # Temporarily disable exit-on-error\
          \ to handle failures in the loop\n  set +e\n  while true; do\n    echo \"\
          $yaml_content\" | oc apply -f -\n    if [ $? -eq 0 ]; then\n      echo \"\
          âś… $description applied successfully.\"\n      break\n    else\n      echo\
          \ \"âš ď¸Ź  Failed to apply $description. This is likely due to RBAC propagation\
          \ or Webhook unavailability.\"\n      echo \"    Retrying in 10 seconds...\"\
          \n      sleep 10\n    fi\n  done\n  set -e\n}\n\n# --- Main Execution ---\n\
          \nwait_for_crd\nwait_for_initial_cr\n\nMAX_RETRIES=5\nATTEMPT=1\nSUCCESS=false\n\
          \nwhile [ $ATTEMPT -le $MAX_RETRIES ]; do\n  echo \"=== Attempt $ATTEMPT/$MAX_RETRIES\
          \ to initialize CertManager ===\"\n  \n  echo \"Deleting CertManager 'cluster'\
          \ CR to trigger reconciliation...\"\n  oc delete certmanager cluster --ignore-not-found\n\
          \  \n  echo -n \"Waiting for CertManager CR to be recreated (by ArgoCD/Operator)...\"\
          \n  while ! oc get certmanager cluster &>/dev/null; do \n    echo -n \"\
          .\"\n    sleep 5\n  done\n  echo \" CR Recreated.\"\n\n  echo \"Waiting\
          \ for CertManager pods/deployments to be ready...\"\n  if oc wait certmanager\
          \ cluster \\\n      --for condition=cert-manager-controller-deploymentAvailable\
          \ \\\n      --for condition=cert-manager-cainjector-deploymentAvailable\
          \ \\\n      --for condition=cert-manager-webhook-deploymentAvailable \\\n\
          \      --timeout=120s -n cert-manager; then\n\n      echo \"CertManager\
          \ deployments available, now waiting for pods...\"\n      oc wait pod -n\
          \ cert-manager \\\n          -l app.kubernetes.io/component=controller \\\
          \n          --for=condition=Ready \\\n          --timeout=120s\n\n     \
          \ oc wait pod -n cert-manager \\\n          -l app.kubernetes.io/component=webhook\
          \ \\\n          --for=condition=Ready \\\n          --timeout=120s\n\n \
          \     echo \"CertManager is ready!\"\n      SUCCESS=true\n      break\n\
          \  else\n      echo \"WARNING: Timeout waiting for CertManager. It might\
          \ be stuck.\"\n      echo \"Retrying loop (will delete CR again)...\"\n\
          \      ATTEMPT=$((ATTEMPT + 1))\n  fi\ndone\n\nif [ \"$SUCCESS\" = false\
          \ ]; then\n  echo \"ERROR: Failed to initialize CertManager after $MAX_RETRIES\
          \ attempts.\"\n  exit 1\nfi\n\necho \"Read the secret for AWS cloud provider\"\
          \nwhile ! oc get secret aws-creds -n kube-system &>/dev/null; do echo \"\
          Waiting for secret aws-creds in namespace kube-system.\"; done\nACCESS_KEY=$(oc\
          \ extract secret/aws-creds -n kube-system --keys aws_access_key_id --to\
          \ -)\nSECRET_KEY=$(oc extract secret/aws-creds -n kube-system --keys aws_secret_access_key\
          \ --to -)\n\necho \"Create the aws-acme secret\"\noc delete secret generic\
          \ aws-acme -n cert-manager --ignore-not-found\noc create secret generic\
          \ aws-acme -n cert-manager --from-literal awsAccessKey=$ACCESS_KEY --from-literal\
          \ awsSecretAccessKey=$SECRET_KEY\n\necho \"Fetching cluster configuration...\"\
          \nexport REGION=$(oc get infrastructure cluster -o jsonpath='{.status.platformStatus.aws.region}')\n\
          export CLUSTER_DOMAIN=$(oc get dns.config.openshift.io/cluster -o jsonpath='{.spec.baseDomain}')\n\
          export TIMESTAMP=$(date +%s)\n\necho \"REGION=$REGION\"\necho \"CLUSTER_DOMAIN=$CLUSTER_DOMAIN\"\
          \necho \"TIMESTAMP=$TIMESTAMP\"\n\n# --- Applying Resources with Retry Logic\
          \ ---\n\necho \"Generating ClusterIssuer YAML...\"\nCLUSTER_ISSUER_YAML=$(cat\
          \ <<EOFISSUER\napiVersion: cert-manager.io/v1\nkind: ClusterIssuer\nmetadata:\n\
          \  name: cluster\nspec:\n  acme:\n    privateKeySecretRef:\n      name:\
          \ acme-global\n    server: 'https://acme-v02.api.letsencrypt.org/directory'\n\
          \    solvers:\n      - dns01:\n          route53:\n            accessKeyIDSecretRef:\n\
          \              key: awsAccessKey\n              name: aws-acme\n       \
          \     region: ${REGION}\n            secretAccessKeySecretRef:\n       \
          \       key: awsSecretAccessKey\n              name: aws-acme\nEOFISSUER\n\
          )\napply_with_retry \"ClusterIssuer\" \"$CLUSTER_ISSUER_YAML\"\n\necho \"\
          Generating Ingress Certificate YAML...\"\n# Note: TIMESTAMP DNS name is\
          \ intentionally dynamic (changes on each Job run)\n# Purpose: Ensures unique\
          \ DNS records for Let's Encrypt DNS-01 challenges\n# The static DNS names\
          \ (apps.${CLUSTER_DOMAIN} and wildcard) remain consistent\nINGRESS_CERT_YAML=$(cat\
          \ <<EOFINGRESS\napiVersion: cert-manager.io/v1\nkind: Certificate\nmetadata:\n\
          \  name: ingress\n  namespace: openshift-ingress\nspec:\n  isCA: false\n\
          \  commonName: \"apps.${CLUSTER_DOMAIN}\"\n  secretName: ingress-certificates\n\
          \  dnsNames:\n  - \"apps.${CLUSTER_DOMAIN}\"\n  - \"*.apps.${CLUSTER_DOMAIN}\"\
          \n  - \"apps.${TIMESTAMP}.${CLUSTER_DOMAIN}\"\n  issuerRef:\n    name: cluster\n\
          \    kind: ClusterIssuer\nEOFINGRESS\n)\napply_with_retry \"Ingress Certificate\"\
          \ \"$INGRESS_CERT_YAML\"\n\necho \"Generating API Certificate YAML...\"\n\
          # Note: TIMESTAMP DNS name is intentionally dynamic (changes on each Job\
          \ run)\n# Purpose: Ensures unique DNS records for Let's Encrypt DNS-01 challenges\n\
          # The static DNS name (api.${CLUSTER_DOMAIN}) remains consistent\nAPI_CERT_YAML=$(cat\
          \ <<EOFAPI\napiVersion: cert-manager.io/v1\nkind: Certificate\nmetadata:\n\
          \  name: api\n  namespace: openshift-config\nspec:\n  isCA: false\n  commonName:\
          \ \"api.${CLUSTER_DOMAIN}\"\n  secretName: api-certificates\n  dnsNames:\n\
          \  - \"api.${CLUSTER_DOMAIN}\"\n  - \"api.${TIMESTAMP}.${CLUSTER_DOMAIN}\"\
          \n  issuerRef:\n    name: cluster\n    kind: ClusterIssuer\nEOFAPI\n)\n\
          apply_with_retry \"API Certificate\" \"$API_CERT_YAML\"\n"
        image: registry.redhat.io/openshift4/ose-cli:latest
        name: create-cluster-cert-manager-resources
      nodeSelector:
        node-role.kubernetes.io/infra: ''
      restartPolicy: Never
      serviceAccountName: openshift-gitops-argocd-application-controller
      tolerations:
      - key: node-role.kubernetes.io/infra
        operator: Exists
