apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: cluster
spec:
  acme:
    privateKeySecretRef:
      name: acme-global
    server: https://acme-v02.api.letsencrypt.org/directory
    solvers:
    - dns01:
        route53:
          accessKeyIDSecretRef:
            key: awsAccessKey
            name: aws-acme
          region: CMP_PLACEHOLDER_CLUSTER_REGION
          secretAccessKeySecretRef:
            key: awsSecretAccessKey
            name: aws-acme
