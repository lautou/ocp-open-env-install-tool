apiVersion: batch/v1
kind: Job
metadata:
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-options: Force=true
    argocd.argoproj.io/sync-wave: "3"
  name: update-cluster-apiserver-cluster
  namespace: openshift-gitops
spec:
  template:
    metadata:
      name: update-cluster-apiserver-cluster
    spec:
      containers:
      - command:
        - /bin/bash
        - -c
        - "set -e\necho \"Fetching cluster domain from DNS CR...\"\nOCP_BASE_DOMAIN=$(oc\
          \ get dns.config.openshift.io/cluster -o jsonpath='{.spec.baseDomain}')\n\
          echo \"OCP_BASE_DOMAIN=$OCP_BASE_DOMAIN\"\n\necho \"Building API URL...\"\n\
          API_URL=\"api.${OCP_BASE_DOMAIN}\"\necho \"API_URL=$API_URL\"\n\necho \"\
          Waiting for certificate to be created...\"\nwhile ! oc get certificate api\
          \ -n openshift-config 2>/dev/null 1>&2; do\n  echo \"Wait for certificate\
          \ to be created.\"\n  sleep 5\ndone\n\necho \"Wait for certificate to be\
          \ ready...\"\noc wait --for=condition=Ready --timeout=-1s certificate/api\
          \ -n openshift-config\n\necho \"Update api config...\"\noc patch apiserver\
          \ cluster --type merge -p '{\"spec\":{\"servingCerts\":{\"namedCertificates\"\
          :[{\"names\":[\"'$API_URL'\"],\"servingCertificate\":{\"name\":\"api-certificates\"\
          }}]}}}'\n\necho \"API server configuration updated successfully!\" \n"
        image: registry.redhat.io/openshift4/ose-cli:latest
        name: update-cluster-apiserver-cluster
      nodeSelector:
        node-role.kubernetes.io/infra: ''
      restartPolicy: Never
      serviceAccountName: cert-manager-operator
      tolerations:
      - key: node-role.kubernetes.io/infra
        operator: Exists
