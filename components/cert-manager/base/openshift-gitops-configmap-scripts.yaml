apiVersion: v1
kind: ConfigMap
metadata:
  name: cert-manager-scripts
  namespace: openshift-gitops
data:
  watchdog-certmanager.sh: |
    #!/bin/bash
    # No set -e: monitoring loop must survive individual command failures

    echo "===================================="
    echo "CertManager Watchdog Started"
    echo "Monitoring for stuck deployments (CM-412 workaround)"
    echo "===================================="

    # Wait for CRD to be available
    echo "Waiting for CertManager CRD..."
    until oc get crd certmanagers.operator.openshift.io &>/dev/null; do
      sleep 5
    done
    echo "CRD available."

    # Track CR age for grace period
    CR_FIRST_SEEN=""
    # Consecutive stuck counter — require 3 checks (~3 min) before acting
    # Prevents false positives on transient reconciliation states (CM-412)
    STUCK_COUNT=0

    # Infinite monitoring loop
    while true; do
      {
      # Check if CertManager CR exists
      if oc get certmanager cluster &>/dev/null 2>&1; then

        # Get CR creation timestamp for age calculation
        CR_CREATION=$(oc get certmanager cluster -o jsonpath='{.metadata.creationTimestamp}' 2>/dev/null || echo "")

        # If this is first time seeing this CR, record it
        if [ -z "$CR_FIRST_SEEN" ]; then
          CR_FIRST_SEEN="$CR_CREATION"
          echo "[$(date)] CertManager CR detected (created: $CR_CREATION)"
        fi

        # Calculate CR age in seconds
        CR_AGE=0
        if [ -n "$CR_CREATION" ]; then
          CR_AGE=$(( $(date +%s) - $(date -d "$CR_CREATION" +%s) )) || CR_AGE=0
        fi

        # Check deployment conditions
        CONTROLLER_AVAILABLE=$(oc get certmanager cluster -o jsonpath='{.status.conditions[?(@.type=="cert-manager-controller-deploymentAvailable")].status}' 2>/dev/null || echo "")
        CAINJECTOR_AVAILABLE=$(oc get certmanager cluster -o jsonpath='{.status.conditions[?(@.type=="cert-manager-cainjector-deploymentAvailable")].status}' 2>/dev/null || echo "")
        WEBHOOK_AVAILABLE=$(oc get certmanager cluster -o jsonpath='{.status.conditions[?(@.type=="cert-manager-webhook-deploymentAvailable")].status}' 2>/dev/null || echo "")

        # Check if pods exist
        POD_COUNT=$(oc get pods -n cert-manager --no-headers 2>/dev/null | wc -l || echo "0")

        # STUCK SCENARIO 1: CR exists but deploymentAvailable conditions are missing/empty AND no pods
        # Only act when CR is old enough (>120s) to rule out normal initialization
        if [ -z "$CONTROLLER_AVAILABLE" ] && [ -z "$CAINJECTOR_AVAILABLE" ] && [ -z "$WEBHOOK_AVAILABLE" ]; then
          if [ "$POD_COUNT" -eq 0 ] && [ "$CR_AGE" -gt 120 ]; then
            STUCK_COUNT=$((STUCK_COUNT + 1))
            echo "[$(date)] STUCK SCENARIO 1 (check $STUCK_COUNT/3): NO conditions, NO pods (age: ${CR_AGE}s)"
            if [ "$STUCK_COUNT" -ge 3 ]; then
              echo "  Confirmed stuck after 3 consecutive checks — deleting CR..."
              oc delete certmanager cluster --ignore-not-found || true
              CR_FIRST_SEEN=""
              STUCK_COUNT=0
              echo "  CR deleted. Operator will recreate it."
            fi
          else
            STUCK_COUNT=0
            echo "[$(date)] CertManager initializing (age: ${CR_AGE}s, pods: $POD_COUNT) - waiting..."
          fi

        # STUCK SCENARIO 2: Conditions exist but unavailable AND no pods running
        # Guard on pod count: transient condition disappearance with running pods is NOT stuck
        elif [ "$CONTROLLER_AVAILABLE" != "True" ] || [ "$CAINJECTOR_AVAILABLE" != "True" ] || [ "$WEBHOOK_AVAILABLE" != "True" ]; then
          if [ "$POD_COUNT" -eq 0 ] && [ "$CR_AGE" -gt 120 ]; then
            STUCK_COUNT=$((STUCK_COUNT + 1))
            echo "[$(date)] STUCK SCENARIO 2 (check $STUCK_COUNT/3): conditions unavailable, NO pods"
            echo "  Controller: ${CONTROLLER_AVAILABLE:-MISSING}"
            echo "  CAInjector: ${CAINJECTOR_AVAILABLE:-MISSING}"
            echo "  Webhook: ${WEBHOOK_AVAILABLE:-MISSING}"
            if [ "$STUCK_COUNT" -ge 3 ]; then
              echo "  Confirmed stuck after 3 consecutive checks — deleting CR..."
              oc delete certmanager cluster --ignore-not-found || true
              CR_FIRST_SEEN=""
              STUCK_COUNT=0
              echo "  CR deleted. Operator will recreate it."
            fi
          else
            STUCK_COUNT=0
            echo "[$(date)] CertManager conditions transient (Controller:${CONTROLLER_AVAILABLE:-MISSING} CAInjector:${CAINJECTOR_AVAILABLE:-MISSING} Webhook:${WEBHOOK_AVAILABLE:-MISSING} pods:$POD_COUNT) - monitoring..."
          fi

        # HEALTHY: All conditions True
        else
          STUCK_COUNT=0
          echo "[$(date)] CertManager healthy (all deployments available, pods: $POD_COUNT)"
        fi

      else
        STUCK_COUNT=0
        # CR not found
        echo "[$(date)] CertManager CR not found (waiting for creation)"
        CR_FIRST_SEEN=""
      fi
      } || echo "[$(date)] WARNING: loop iteration error (continuing)"

      # Check every 60 seconds
      sleep 60
    done
