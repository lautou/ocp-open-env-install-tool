apiVersion: v1
kind: ConfigMap
metadata:
  name: cert-manager-scripts
  namespace: openshift-gitops
data:
  watchdog-certmanager.sh: |
    #!/bin/bash
    set -e

    echo "===================================="
    echo "CertManager Watchdog Started"
    echo "Monitoring for stuck deployments (CM-412 workaround)"
    echo "===================================="

    # Wait for CRD to be available
    echo "Waiting for CertManager CRD..."
    until oc get crd certmanagers.operator.openshift.io &>/dev/null; do
      sleep 5
    done
    echo "CRD available."

    # Infinite monitoring loop
    while true; do
      # Check if CertManager CR exists
      if oc get certmanager cluster &>/dev/null 2>&1; then

        # Check deployment conditions (only criteria for stuck detection)
        CONTROLLER_AVAILABLE=$(oc get certmanager cluster -o jsonpath='{.status.conditions[?(@.type=="cert-manager-controller-deploymentAvailable")].status}' 2>/dev/null || echo "Unknown")
        CAINJECTOR_AVAILABLE=$(oc get certmanager cluster -o jsonpath='{.status.conditions[?(@.type=="cert-manager-cainjector-deploymentAvailable")].status}' 2>/dev/null || echo "Unknown")
        WEBHOOK_AVAILABLE=$(oc get certmanager cluster -o jsonpath='{.status.conditions[?(@.type=="cert-manager-webhook-deploymentAvailable")].status}' 2>/dev/null || echo "Unknown")

        # If any deployment is not available, CertManager is stuck
        if [ "$CONTROLLER_AVAILABLE" != "True" ] || [ "$CAINJECTOR_AVAILABLE" != "True" ] || [ "$WEBHOOK_AVAILABLE" != "True" ]; then
          echo "[$(date)] CertManager stuck detected:"
          echo "  Controller: $CONTROLLER_AVAILABLE"
          echo "  CAInjector: $CAINJECTOR_AVAILABLE"
          echo "  Webhook: $WEBHOOK_AVAILABLE"
          echo "  Deleting CertManager CR to trigger reconciliation..."

          oc delete certmanager cluster --ignore-not-found

          echo "  CR deleted. Operator will recreate it."
        else
          echo "[$(date)] CertManager healthy (all deployments available)"
        fi
      else
        echo "[$(date)] CertManager CR not found (waiting for creation)"
      fi

      # Check every 60 seconds
      sleep 60
    done
