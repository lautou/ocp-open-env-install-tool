apiVersion: v1
kind: ConfigMap
metadata:
  name: cert-manager-scripts
  namespace: openshift-gitops
data:
  create-cert-manager-resources.sh: |
    #!/bin/bash
    set -e

    # --- Helper Functions ---

    wait_for_crd() {
      echo -n "Waiting for the cert-manager CRD..."
      until oc get crd certmanagers.operator.openshift.io &>/dev/null; do
        echo -n "."
        sleep 5
      done
      echo " CRD established."
    }

    wait_for_initial_cr() {
      echo -n "Waiting for the initial CertManager 'cluster' CR..."
      until oc get certmanager cluster &>/dev/null; do
        echo -n "."
        sleep 5
      done
      echo " Initial CR found."
    }

    # Robust apply function that retries indefinitely
    apply_with_retry() {
      local description=$1
      local yaml_content=$2

      echo "--- Applying $description ---"
      # Temporarily disable exit-on-error to handle failures in the loop
      set +e
      while true; do
        echo "$yaml_content" | oc apply -f -
        if [ $? -eq 0 ]; then
          echo "✅ $description applied successfully."
          break
        else
          echo "⚠️  Failed to apply $description. This is likely due to RBAC propagation or Webhook unavailability."
          echo "    Retrying in 10 seconds..."
          sleep 10
        fi
      done
      set -e
    }

    # --- Main Execution ---

    wait_for_crd
    wait_for_initial_cr

    MAX_RETRIES=5
    ATTEMPT=1
    SUCCESS=false

    while [ $ATTEMPT -le $MAX_RETRIES ]; do
      echo "=== Attempt $ATTEMPT/$MAX_RETRIES to initialize CertManager ==="

      echo "Deleting CertManager 'cluster' CR to trigger reconciliation..."
      oc delete certmanager cluster --ignore-not-found

      echo -n "Waiting for CertManager CR to be recreated (by ArgoCD/Operator)..."
      while ! oc get certmanager cluster &>/dev/null; do
        echo -n "."
        sleep 5
      done
      echo " CR Recreated."

      echo "Waiting for CertManager pods/deployments to be ready..."
      if oc wait certmanager cluster \
          --for condition=cert-manager-controller-deploymentAvailable \
          --for condition=cert-manager-cainjector-deploymentAvailable \
          --for condition=cert-manager-webhook-deploymentAvailable \
          --timeout=120s; then

          echo "CertManager deployments available, now waiting for pods..."
          oc wait pod -n cert-manager \
              -l app.kubernetes.io/component=controller \
              --for=condition=Ready \
              --timeout=120s

          oc wait pod -n cert-manager \
              -l app.kubernetes.io/component=webhook \
              --for=condition=Ready \
              --timeout=120s

          echo "CertManager is ready!"
          SUCCESS=true
          break
      else
          echo "WARNING: Timeout waiting for CertManager. It might be stuck."
          echo "Retrying loop (will delete CR again)..."
          ATTEMPT=$((ATTEMPT + 1))
      fi
    done

    if [ "$SUCCESS" = false ]; then
      echo "ERROR: Failed to initialize CertManager after $MAX_RETRIES attempts."
      exit 1
    fi

    echo "Read the secret for AWS cloud provider"
    while ! oc get secret aws-creds -n kube-system &>/dev/null; do
      echo "Waiting for secret aws-creds in namespace kube-system."
    done
    ACCESS_KEY=$(oc extract secret/aws-creds -n kube-system --keys aws_access_key_id --to -)
    SECRET_KEY=$(oc extract secret/aws-creds -n kube-system --keys aws_secret_access_key --to -)

    echo "Create the aws-acme secret"
    oc delete secret generic aws-acme -n cert-manager --ignore-not-found
    oc create secret generic aws-acme -n cert-manager \
      --from-literal awsAccessKey=$ACCESS_KEY \
      --from-literal awsSecretAccessKey=$SECRET_KEY

    echo "Fetching cluster configuration..."
    export OCP_BASE_DOMAIN=$(oc get dns.config.openshift.io/cluster -o jsonpath='{.spec.baseDomain}')
    export TIMESTAMP=$(date +%s)

    echo "OCP_BASE_DOMAIN=$OCP_BASE_DOMAIN"
    echo "TIMESTAMP=$TIMESTAMP"

    # --- Applying Resources with Retry Logic ---

    echo "Generating Ingress Certificate YAML..."
    # Note: TIMESTAMP DNS name is intentionally dynamic (changes on each Job run)
    # Purpose: Ensures unique DNS records for Let's Encrypt DNS-01 challenges
    # The static DNS names (apps.${OCP_BASE_DOMAIN} and wildcard) remain consistent
    INGRESS_CERT_YAML=$(cat <<EOFINGRESS
    apiVersion: cert-manager.io/v1
    kind: Certificate
    metadata:
      name: ingress
      namespace: openshift-ingress
    spec:
      isCA: false
      commonName: "apps.${OCP_BASE_DOMAIN}"
      secretName: ingress-certificates
      dnsNames:
      - "apps.${OCP_BASE_DOMAIN}"
      - "*.apps.${OCP_BASE_DOMAIN}"
      - "apps.${TIMESTAMP}.${OCP_BASE_DOMAIN}"
      issuerRef:
        name: cluster
        kind: ClusterIssuer
    EOFINGRESS
    )
    apply_with_retry "Ingress Certificate" "$INGRESS_CERT_YAML"

    echo "Generating API Certificate YAML..."
    # Note: TIMESTAMP DNS name is intentionally dynamic (changes on each Job run)
    # Purpose: Ensures unique DNS records for Let's Encrypt DNS-01 challenges
    # The static DNS name (api.${OCP_BASE_DOMAIN}) remains consistent
    API_CERT_YAML=$(cat <<EOFAPI
    apiVersion: cert-manager.io/v1
    kind: Certificate
    metadata:
      name: api
      namespace: openshift-config
    spec:
      isCA: false
      commonName: "api.${OCP_BASE_DOMAIN}"
      secretName: api-certificates
      dnsNames:
      - "api.${OCP_BASE_DOMAIN}"
      - "api.${TIMESTAMP}.${OCP_BASE_DOMAIN}"
      issuerRef:
        name: cluster
        kind: ClusterIssuer
    EOFAPI
    )
    apply_with_retry "API Certificate" "$API_CERT_YAML"
