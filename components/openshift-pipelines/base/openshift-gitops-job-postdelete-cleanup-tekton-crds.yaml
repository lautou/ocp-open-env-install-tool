apiVersion: batch/v1
kind: Job
metadata:
  annotations:
    argocd.argoproj.io/hook: PostDelete
    argocd.argoproj.io/sync-options: Force=true
  name: postdelete-cleanup-tekton-crds
  namespace: openshift-gitops
spec:
  backoffLimit: 3
  template:
    metadata:
      name: postdelete-cleanup-tekton-crds
    spec:
      containers:
      - command:
        - /bin/bash
        - -c
        - |
          set -e

          echo "=== PostDelete Hook: Cleaning up Tekton CRDs ==="

          tekton_crds=$(oc get crd -o name 2>/dev/null | grep 'operator.tekton.dev' || true)

          if [ -z "$tekton_crds" ]; then
            echo "  No Tekton CRDs found - already clean"
          else
            echo "  Found Tekton CRDs:"
            echo "$tekton_crds" | sed 's/^/    /'

            echo ""
            echo "  Deleting CRDs..."
            for crd in $tekton_crds; do
              crd_name=$(echo $crd | sed 's|customresourcedefinition.apiextensions.k8s.io/||')
              echo "    Deleting $crd_name..."

              # Remove finalizers if present
              oc patch crd $crd_name --type json -p='[{"op": "remove", "path": "/metadata/finalizers"}]' 2>/dev/null || true

              # Delete CRD
              oc delete $crd --ignore-not-found=true --timeout=60s 2>/dev/null || {
                echo "      WARNING: Failed to delete $crd_name gracefully, forcing..."
                oc delete $crd --ignore-not-found=true --force --grace-period=0 2>/dev/null || true
              }
            done

            echo ""
            echo "  Verifying CRD deletion..."
            sleep 5
            remaining=$(oc get crd -o name 2>/dev/null | grep 'operator.tekton.dev' || true)
            if [ -z "$remaining" ]; then
              echo "  ✓ All Tekton CRDs deleted successfully"
            else
              echo "  WARNING: Some CRDs still remain:"
              echo "$remaining" | sed 's/^/    /'
            fi
          fi

          echo ""
          echo "=== PostDelete cleanup completed ==="
        image: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
        imagePullPolicy: IfNotPresent
        name: postdelete-cleanup-tekton-crds
      dnsPolicy: ClusterFirst
      restartPolicy: Never
      serviceAccount: openshift-gitops-argocd-application-controller
      serviceAccountName: openshift-gitops-argocd-application-controller
      terminationGracePeriodSeconds: 30
