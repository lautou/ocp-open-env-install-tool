apiVersion: batch/v1
kind: Job
metadata:
  annotations:
    argocd.argoproj.io/sync-options: Force=true
  name: cleanup-auto-tektonconfig
  namespace: openshift-gitops
spec:
  template:
    metadata:
      name: cleanup-auto-tektonconfig
    spec:
      containers:
      - command:
        - /bin/bash
        - -c
        - |
          #!/bin/bash
          set -e

          echo "Waiting for Tekton operator to be ready..."
          sleep 10

          if oc get tektonconfig config &>/dev/null; then
            echo "Found auto-created TektonConfig 'config'"

            # Check if it has our targetNamespace
            CURRENT_NS=$(oc get tektonconfig config -o jsonpath='{.spec.targetNamespace}')
            echo "Current targetNamespace: $CURRENT_NS"

            if [[ "$CURRENT_NS" != "openshift-pipelines" ]]; then
              echo "TektonConfig has wrong targetNamespace ($CURRENT_NS), deleting..."

              # Remove finalizer and delete
              oc patch tektonconfig config --type json -p='[{"op": "remove", "path": "/metadata/finalizers"}]' || true
              oc delete tektonconfig config --wait=false || true

              # Wait for deletion
              while oc get tektonconfig config &>/dev/null; do
                echo "Waiting for TektonConfig deletion..."
                sleep 2
              done
              echo "TektonConfig deleted successfully"
            else
              echo "TektonConfig already has correct targetNamespace, skipping"
            fi
          else
            echo "No auto-created TektonConfig found, nothing to clean up"
          fi

          echo "Cleanup complete"
        image: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
        imagePullPolicy: IfNotPresent
        name: cleanup
      dnsPolicy: ClusterFirst
      restartPolicy: Never
      serviceAccount: openshift-gitops-argocd-application-controller
      serviceAccountName: openshift-gitops-argocd-application-controller
      terminationGracePeriodSeconds: 30
  ttlSecondsAfterFinished: 300
