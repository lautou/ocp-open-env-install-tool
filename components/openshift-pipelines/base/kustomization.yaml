apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../common
# TektonConfig is fully operator-managed (not declared in ArgoCD)
# Removed: cluster-tektonconfig-config.yaml, cluster-crb-pipelines-tektonconfig-edit.yaml, job cleanup-auto-tektonconfig
- openshift-gitops-job-disable-pipelines-console-plugin.yaml
- openshift-gitops-job-enable-pipelines-console-plugin.yaml
- openshift-operators-subscription-openshift-pipelines-operator.yaml
replacements:
- source:
    fieldPath: data.openshift-pipelines
    kind: ConfigMap
    name: cluster-versions
  targets:
  - fieldPaths:
    - spec.channel
    select:
      kind: Subscription
      name: openshift-pipelines-operator
