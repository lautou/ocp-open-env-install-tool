apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../common
- openshift-operators-subscription-servicemeshoperator3.yaml
replacements:
- source:
    fieldPath: data.openshift-service-mesh
    kind: ConfigMap
    name: cluster-versions
  targets:
  - fieldPaths:
    - spec.channel
    select:
      kind: Subscription
      name: servicemeshoperator3
