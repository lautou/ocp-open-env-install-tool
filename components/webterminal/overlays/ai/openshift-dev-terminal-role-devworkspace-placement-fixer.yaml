apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: devworkspace-placement-fixer
  namespace: openshift-dev-terminal
rules:
- apiGroups:
  - ""
  resources:
  - pods
  verbs:
  - delete
  - get
  - list
- apiGroups:
  - apps
  resources:
  - deployments
  verbs:
  - delete
  - get
- apiGroups:
  - controller.devfile.io
  resources:
  - devworkspaceoperatorconfigs
  verbs:
  - get
