apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../common
- grafana-operator-namespace.yaml
- grafana-operator-operatorgroup-grafana-operator.yaml
- grafana-operator-subscription-grafana-operator.yaml
replacements:
- source:
    fieldPath: data.grafana
    kind: ConfigMap
    name: cluster-versions
  targets:
  - fieldPaths:
    - spec.channel
    select:
      kind: Subscription
      name: grafana-operator
