apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../common
  - grafana-operator-namespace.yaml
  - grafana-operator-operatorgroup-grafana-operator.yaml
  - grafana-operator-subscription-grafana-operator.yaml

replacements:
  - source:
      kind: ConfigMap
      name: cluster-versions
      fieldPath: data.grafana
    targets:
      - select:
          kind: Subscription
          name: grafana-operator
        fieldPaths:
          - spec.channel
