apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pipeline-manager
  namespace: ai-generation-llm-rag
rules:
- apiGroups:
  - ""
  resources:
  - pods
  - pods/log
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - get
  - list
- apiGroups:
  - argoproj.io
  resources:
  - workflows
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - pipelines.kubeflow.org
  resources:
  - pipelines
  - pipelineversions
  verbs:
  - get
  - list
  - create
  - update
  - patch
