apiVersion: v1
kind: ConfigMap
metadata:
  name: pipeline-rag-embedding-storage
  namespace: ai-generation-llm-rag
data:
  pipeline.yaml: |
    # PIPELINE DEFINITION
    # Name: rag-embedding-storage-pipeline
    # Description: RAG Stage 2: Generate embeddings and store in pgvector
    # Inputs:
    #    chunks_directory: str [Default: '']
    #    embedding_batch_size: int [Default: 32.0]
    #    embedding_endpoint: str [Default: 'https://granite-embedding-predictor.ai-embedding-service.svc.cluster.local:8443']
    #    postgres_database: str [Default: 'ragdb']
    #    postgres_host: str [Default: 'rag-postgresql.external-db-generation-llm-rag.svc.cluster.local']
    #    postgres_password: str [Default: '']
    #    postgres_port: int [Default: 5432.0]
    #    postgres_table_name: str [Default: 'document_chunks']
    #    postgres_user: str [Default: 'raguser']
    components:
      comp-collect-chunks:
        executorLabel: exec-collect-chunks
        inputDefinitions:
          artifacts:
            chunks_dir:
              artifactType:
                schemaTitle: system.Artifact
                schemaVersion: 0.0.1
              description: Directory containing *_chunks.jsonl files from docling-chunk
        outputDefinitions:
          artifacts:
            output_path:
              artifactType:
                schemaTitle: system.Dataset
                schemaVersion: 0.0.1
          parameters:
            total_chunks:
              description: Total number of chunks collected
              parameterType: NUMBER_INTEGER
      comp-generate-embeddings:
        executorLabel: exec-generate-embeddings
        inputDefinitions:
          artifacts:
            chunks_path:
              artifactType:
                schemaTitle: system.Dataset
                schemaVersion: 0.0.1
              description: Input path to merged chunks JSONL file
          parameters:
            batch_size:
              defaultValue: 32.0
              description: 'Number of chunks to process per API call (default: 32)'
              isOptional: true
              parameterType: NUMBER_INTEGER
            embedding_endpoint:
              description: URL of the granite-embedding InferenceService
              parameterType: STRING
        outputDefinitions:
          artifacts:
            output_path:
              artifactType:
                schemaTitle: system.Dataset
                schemaVersion: 0.0.1
          parameters:
            embedding_dim:
              description: Dimensionality of embeddings (768 for granite-embedding)
              parameterType: NUMBER_INTEGER
            num_chunks:
              description: Total number of chunks processed
              parameterType: NUMBER_INTEGER
      comp-importer:
        executorLabel: exec-importer
        inputDefinitions:
          parameters:
            uri:
              parameterType: STRING
        outputDefinitions:
          artifacts:
            artifact:
              artifactType:
                schemaTitle: system.Artifact
                schemaVersion: 0.0.1
      comp-store-in-pgvector:
        executorLabel: exec-store-in-pgvector
        inputDefinitions:
          artifacts:
            chunks_with_embeddings_path:
              artifactType:
                schemaTitle: system.Dataset
                schemaVersion: 0.0.1
              description: Input path to chunks enriched with embeddings
          parameters:
            postgres_database:
              description: Database name
              parameterType: STRING
            postgres_host:
              description: PostgreSQL server hostname
              parameterType: STRING
            postgres_password:
              description: Database password
              parameterType: STRING
            postgres_port:
              description: PostgreSQL server port
              parameterType: NUMBER_INTEGER
            postgres_user:
              description: Database user
              parameterType: STRING
            table_name:
              defaultValue: document_chunks
              description: 'Table name for storing chunks (default: document_chunks)'
              isOptional: true
              parameterType: STRING
        outputDefinitions:
          parameters:
            num_rows_inserted:
              description: Total number of rows inserted
              parameterType: NUMBER_INTEGER
            table_name:
              description: Name of the table used
              parameterType: STRING
    deploymentSpec:
      executors:
        exec-collect-chunks:
          container:
            args:
            - --executor_input
            - '{{$}}'
            - --function_to_execute
            - collect_chunks
            command:
            - sh
            - -c
            - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
              \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
              \ python3 -m pip install --quiet --no-warn-script-location 'requests==2.32.3'\
              \  &&  python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
              \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
              $0\" \"$@\"\n"
            - sh
            - -ec
            - 'program_path=$(mktemp -d)
    
    
              printf "%s" "$0" > "$program_path/ephemeral_component.py"
    
              _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"
    
              '
            - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
              \ *\n\ndef collect_chunks(\n    chunks_dir: dsl.Input[dsl.Artifact],\n \
              \   output_path: dsl.Output[dsl.Dataset],\n) -> NamedTuple('Outputs', [('total_chunks',\
              \ int)]):\n    \"\"\"\n    Collect all chunk files from docling-chunk output\
              \ directory.\n\n    Scans the input directory for all *_chunks.jsonl files\
              \ and merges them\n    into a single JSONL dataset for efficient batch processing.\n\
              \n    Args:\n        chunks_dir: Directory containing *_chunks.jsonl files\
              \ from docling-chunk\n        output_path: Output path for merged chunks\
              \ JSONL file\n\n    Returns:\n        total_chunks: Total number of chunks\
              \ collected\n    \"\"\"\n    import json\n    from pathlib import Path\n\
              \n    chunks_path = Path(chunks_dir.path)\n    output_file = Path(output_path.path)\n\
              \    output_file.parent.mkdir(parents=True, exist_ok=True)\n\n    print(f\"\
              collect-chunks: scanning {chunks_path}\", flush=True)\n\n    total_chunks\
              \ = 0\n    chunk_files = list(chunks_path.glob(\"**/*_chunks.jsonl\"))\n\
              \n    print(f\"collect-chunks: found {len(chunk_files)} chunk files\", flush=True)\n\
              \n    with open(output_file, 'w', encoding='utf-8') as outfile:\n      \
              \  for chunk_file in chunk_files:\n            print(f\"collect-chunks:\
              \ processing {chunk_file.name}\", flush=True)\n\n            with open(chunk_file,\
              \ 'r', encoding='utf-8') as infile:\n                for line in infile:\n\
              \                    chunk_data = json.loads(line.strip())\n           \
              \         outfile.write(json.dumps(chunk_data) + '\\n')\n              \
              \      total_chunks += 1\n\n    print(f\"collect-chunks: merged {total_chunks}\
              \ total chunks\", flush=True)\n\n    outputs = NamedTuple('Outputs', [('total_chunks',\
              \ int)])\n    return outputs(total_chunks)\n\n"
            image: registry.access.redhat.com/ubi9/python-311:9.7-1775725322
            resources:
              cpuLimit: 1.0
              cpuRequest: 0.25
              memoryLimit: 2.0
              memoryRequest: 0.512
              resourceCpuLimit: '1'
              resourceCpuRequest: 250m
              resourceMemoryLimit: 2G
              resourceMemoryRequest: 512M
        exec-generate-embeddings:
          container:
            args:
            - --executor_input
            - '{{$}}'
            - --function_to_execute
            - generate_embeddings
            command:
            - sh
            - -c
            - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
              \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
              \ python3 -m pip install --quiet --no-warn-script-location 'requests==2.32.3'\
              \  &&  python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
              \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
              $0\" \"$@\"\n"
            - sh
            - -ec
            - 'program_path=$(mktemp -d)
    
    
              printf "%s" "$0" > "$program_path/ephemeral_component.py"
    
              _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"
    
              '
            - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
              \ *\n\ndef generate_embeddings(\n    chunks_path: dsl.Input[dsl.Dataset],\n\
              \    embedding_endpoint: str,\n    output_path: dsl.Output[dsl.Dataset],\n\
              \    batch_size: int = 32,\n) -> NamedTuple('Outputs', [('num_chunks', int),\
              \ ('embedding_dim', int)]):\n    \"\"\"\n    Generate embeddings for text\
              \ chunks using granite-embedding model.\n\n    Calls the granite-embedding-english-r2\
              \ InferenceService to generate\n    768-dimensional embeddings for each\
              \ chunk. Processes in batches for\n    efficiency and includes retry logic\
              \ for resilience.\n\n    Args:\n        chunks_path: Input path to merged\
              \ chunks JSONL file\n        embedding_endpoint: URL of the granite-embedding\
              \ InferenceService\n        output_path: Output path for chunks enriched\
              \ with embeddings\n        batch_size: Number of chunks to process per API\
              \ call (default: 32)\n\n    Returns:\n        num_chunks: Total number of\
              \ chunks processed\n        embedding_dim: Dimensionality of embeddings\
              \ (768 for granite-embedding)\n    \"\"\"\n    import json\n    import time\n\
              \    from pathlib import Path\n    import requests\n\n    # Read ServiceAccount\
              \ token for authentication\n    token_path = \"/var/run/secrets/kubernetes.io/serviceaccount/token\"\
              \n    with open(token_path, 'r') as f:\n        token = f.read().strip()\n\
              \n    headers = {\n        \"Authorization\": f\"Bearer {token}\",\n   \
              \     \"Content-Type\": \"application/json\",\n    }\n\n    # Load all chunks\n\
              \    chunks = []\n    with open(chunks_path.path, 'r', encoding='utf-8')\
              \ as f:\n        for line in f:\n            chunks.append(json.loads(line.strip()))\n\
              \n    print(f\"generate-embeddings: loaded {len(chunks)} chunks\", flush=True)\n\
              \    print(f\"generate-embeddings: endpoint {embedding_endpoint}\", flush=True)\n\
              \    print(f\"generate-embeddings: batch size = {batch_size}\", flush=True)\n\
              \n    # Process chunks in batches\n    embedding_dim = None\n    processed\
              \ = 0\n\n    for i in range(0, len(chunks), batch_size):\n        batch\
              \ = chunks[i:i + batch_size]\n        batch_texts = [chunk.get('text', '')\
              \ for chunk in batch]\n\n        # Call embedding service with retry logic\n\
              \        max_retries = 3\n        for attempt in range(max_retries):\n \
              \           try:\n                response = requests.post(\n          \
              \          f\"{embedding_endpoint}/v1/embeddings\",\n                  \
              \  headers=headers,\n                    json={\n                      \
              \  \"input\": batch_texts,\n                        \"model\": \"granite-embedding\"\
              \n                    },\n                    timeout=60,\n            \
              \        verify=False  # Internal service with self-signed cert\n      \
              \          )\n                response.raise_for_status()\n            \
              \    break\n            except Exception as e:\n                if attempt\
              \ == max_retries - 1:\n                    raise RuntimeError(f\"Failed\
              \ to generate embeddings after {max_retries} attempts: {e}\")\n        \
              \        print(f\"Retry {attempt + 1}/{max_retries} due to: {e}\", flush=True)\n\
              \                time.sleep(2 ** attempt)  # Exponential backoff\n\n   \
              \     result = response.json()\n        embeddings = [item['embedding']\
              \ for item in result['data']]\n\n        # Determine embedding dimension\
              \ from first batch\n        if embedding_dim is None:\n            embedding_dim\
              \ = len(embeddings[0])\n            print(f\"generate-embeddings: embedding\
              \ dimension = {embedding_dim}\", flush=True)\n\n        # Enrich chunks\
              \ with embeddings\n        for chunk, embedding in zip(batch, embeddings):\n\
              \            chunk['embedding'] = embedding\n\n        processed += len(batch)\n\
              \        if (i // batch_size + 1) % 10 == 0:\n            print(f\"generate-embeddings:\
              \ processed {processed}/{len(chunks)} chunks\", flush=True)\n\n    # Write\
              \ enriched chunks\n    output_file = Path(output_path.path)\n    output_file.parent.mkdir(parents=True,\
              \ exist_ok=True)\n\n    with open(output_file, 'w', encoding='utf-8') as\
              \ f:\n        for chunk in chunks:\n            f.write(json.dumps(chunk)\
              \ + '\\n')\n\n    print(f\"generate-embeddings: completed {len(chunks)}\
              \ chunks with {embedding_dim}-dim embeddings\", flush=True)\n\n    outputs\
              \ = NamedTuple('Outputs', [('num_chunks', int), ('embedding_dim', int)])\n\
              \    return outputs(len(chunks), embedding_dim)\n\n"
            image: registry.access.redhat.com/ubi9/python-311:9.7-1775725322
            resources:
              cpuLimit: 2.0
              cpuRequest: 0.5
              memoryLimit: 4.0
              memoryRequest: 1.0
              resourceCpuLimit: '2'
              resourceCpuRequest: 500m
              resourceMemoryLimit: 4G
              resourceMemoryRequest: 1G
        exec-importer:
          importer:
            artifactUri:
              runtimeParameter: uri
            typeSchema:
              schemaTitle: system.Artifact
              schemaVersion: 0.0.1
        exec-store-in-pgvector:
          container:
            args:
            - --executor_input
            - '{{$}}'
            - --function_to_execute
            - store_in_pgvector
            command:
            - sh
            - -c
            - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
              \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
              \ python3 -m pip install --quiet --no-warn-script-location 'psycopg2-binary==2.9.9'\
              \ 'pgvector==0.3.6'  &&  python3 -m pip install --quiet --no-warn-script-location\
              \ 'kfp==2.16.0' '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"\
              3.9\"' && \"$0\" \"$@\"\n"
            - sh
            - -ec
            - 'program_path=$(mktemp -d)
    
    
              printf "%s" "$0" > "$program_path/ephemeral_component.py"
    
              _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"
    
              '
            - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
              \ *\n\ndef store_in_pgvector(\n    chunks_with_embeddings_path: dsl.Input[dsl.Dataset],\n\
              \    postgres_host: str,\n    postgres_port: int,\n    postgres_database:\
              \ str,\n    postgres_user: str,\n    postgres_password: str,\n    table_name:\
              \ str = 'document_chunks',\n) -> NamedTuple('Outputs', [('num_rows_inserted',\
              \ int), ('table_name', str)]):\n    \"\"\"\n    Store chunks with embeddings\
              \ in PostgreSQL database with pgvector.\n\n    Creates table with vector(768)\
              \ column, HNSW index for fast cosine similarity\n    search, and inserts\
              \ all chunks with their embeddings in batches.\n\n    Args:\n        chunks_with_embeddings_path:\
              \ Input path to chunks enriched with embeddings\n        postgres_host:\
              \ PostgreSQL server hostname\n        postgres_port: PostgreSQL server port\n\
              \        postgres_database: Database name\n        postgres_user: Database\
              \ user\n        postgres_password: Database password\n        table_name:\
              \ Table name for storing chunks (default: document_chunks)\n\n    Returns:\n\
              \        num_rows_inserted: Total number of rows inserted\n        table_name:\
              \ Name of the table used\n    \"\"\"\n    import json\n    from pathlib\
              \ import Path\n\n    import psycopg2\n    from pgvector.psycopg2 import\
              \ register_vector\n\n    # Connect to PostgreSQL\n    print(f\"store-in-pgvector:\
              \ connecting to {postgres_host}:{postgres_port}/{postgres_database}\", flush=True)\n\
              \n    conn = psycopg2.connect(\n        host=postgres_host,\n        port=postgres_port,\n\
              \        database=postgres_database,\n        user=postgres_user,\n    \
              \    password=postgres_password\n    )\n    conn.autocommit = False\n\n\
              \    # Register pgvector type\n    register_vector(conn)\n\n    cursor =\
              \ conn.cursor()\n\n    # Create table if not exists\n    cursor.execute(f\"\
              \"\"\n        CREATE TABLE IF NOT EXISTS {table_name} (\n            id\
              \ SERIAL PRIMARY KEY,\n            text TEXT NOT NULL,\n            embedding\
              \ vector(768) NOT NULL,\n            source VARCHAR(1024),\n           \
              \ chunk_index INTEGER,\n            metadata JSONB,\n            created_at\
              \ TIMESTAMP DEFAULT CURRENT_TIMESTAMP\n        )\n    \"\"\")\n\n    # Create\
              \ HNSW index for fast cosine similarity search\n    cursor.execute(f\"\"\
              \"\n        CREATE INDEX IF NOT EXISTS {table_name}_embedding_idx\n    \
              \    ON {table_name} USING hnsw (embedding vector_cosine_ops)\n    \"\"\"\
              )\n\n    conn.commit()\n    print(f\"store-in-pgvector: table '{table_name}'\
              \ ready with HNSW index\", flush=True)\n\n    # Load chunks with embeddings\n\
              \    chunks = []\n    with open(chunks_with_embeddings_path.path, 'r', encoding='utf-8')\
              \ as f:\n        for line in f:\n            chunks.append(json.loads(line.strip()))\n\
              \n    print(f\"store-in-pgvector: inserting {len(chunks)} chunks\", flush=True)\n\
              \n    # Insert chunks in batches\n    batch_size = 100\n    num_inserted\
              \ = 0\n\n    for i in range(0, len(chunks), batch_size):\n        batch\
              \ = chunks[i:i + batch_size]\n\n        for chunk in batch:\n          \
              \  text = chunk.get('text', '')\n            embedding = chunk.get('embedding',\
              \ [])\n            source = chunk.get('source', 'unknown')\n           \
              \ chunk_index = chunk.get('chunk_index', 0)\n\n            # Store remaining\
              \ fields as metadata JSON\n            metadata = {k: v for k, v in chunk.items()\
              \ if k not in ['text', 'embedding', 'source', 'chunk_index']}\n\n      \
              \      cursor.execute(\n                f\"\"\"\n                INSERT\
              \ INTO {table_name} (text, embedding, source, chunk_index, metadata)\n \
              \               VALUES (%s, %s, %s, %s, %s)\n                \"\"\",\n \
              \               (text, embedding, source, chunk_index, json.dumps(metadata))\n\
              \            )\n\n        conn.commit()\n        num_inserted += len(batch)\n\
              \n        if (i // batch_size + 1) % 10 == 0:\n            print(f\"store-in-pgvector:\
              \ inserted {num_inserted}/{len(chunks)} chunks\", flush=True)\n\n    cursor.close()\n\
              \    conn.close()\n\n    print(f\"store-in-pgvector: completed insertion\
              \ of {num_inserted} rows into '{table_name}'\", flush=True)\n\n    outputs\
              \ = NamedTuple('Outputs', [('num_rows_inserted', int), ('table_name', str)])\n\
              \    return outputs(num_inserted, table_name)\n\n"
            image: registry.access.redhat.com/ubi9/python-311:9.7-1775725322
            resources:
              cpuLimit: 1.0
              cpuRequest: 0.25
              memoryLimit: 2.0
              memoryRequest: 0.512
              resourceCpuLimit: '1'
              resourceCpuRequest: 250m
              resourceMemoryLimit: 2G
              resourceMemoryRequest: 512M
    pipelineInfo:
      description: 'RAG Stage 2: Generate embeddings and store in pgvector'
      name: rag-embedding-storage-pipeline
    root:
      dag:
        tasks:
          collect-chunks:
            cachingOptions: {}
            componentRef:
              name: comp-collect-chunks
            dependentTasks:
            - importer
            inputs:
              artifacts:
                chunks_dir:
                  taskOutputArtifact:
                    outputArtifactKey: artifact
                    producerTask: importer
            taskInfo:
              name: collect-chunks
          generate-embeddings:
            cachingOptions: {}
            componentRef:
              name: comp-generate-embeddings
            dependentTasks:
            - collect-chunks
            inputs:
              artifacts:
                chunks_path:
                  taskOutputArtifact:
                    outputArtifactKey: output_path
                    producerTask: collect-chunks
              parameters:
                batch_size:
                  componentInputParameter: embedding_batch_size
                embedding_endpoint:
                  componentInputParameter: embedding_endpoint
            taskInfo:
              name: generate-embeddings
          importer:
            cachingOptions:
              enableCache: true
            componentRef:
              name: comp-importer
            inputs:
              parameters:
                uri:
                  componentInputParameter: chunks_directory
            taskInfo:
              name: importer
          store-in-pgvector:
            cachingOptions: {}
            componentRef:
              name: comp-store-in-pgvector
            dependentTasks:
            - generate-embeddings
            inputs:
              artifacts:
                chunks_with_embeddings_path:
                  taskOutputArtifact:
                    outputArtifactKey: output_path
                    producerTask: generate-embeddings
              parameters:
                postgres_database:
                  componentInputParameter: postgres_database
                postgres_host:
                  componentInputParameter: postgres_host
                postgres_password:
                  componentInputParameter: postgres_password
                postgres_port:
                  componentInputParameter: postgres_port
                postgres_user:
                  componentInputParameter: postgres_user
                table_name:
                  componentInputParameter: postgres_table_name
            taskInfo:
              name: store-in-pgvector
      inputDefinitions:
        parameters:
          chunks_directory:
            defaultValue: ''
            description: Path to directory containing *_chunks.jsonl files
            isOptional: true
            parameterType: STRING
          embedding_batch_size:
            defaultValue: 32.0
            description: 'Number of chunks per embedding API call (default: 32)'
            isOptional: true
            parameterType: NUMBER_INTEGER
          embedding_endpoint:
            defaultValue: https://granite-embedding-predictor.ai-embedding-service.svc.cluster.local:8443
            description: URL of granite-embedding InferenceService
            isOptional: true
            parameterType: STRING
          postgres_database:
            defaultValue: ragdb
            description: Database name
            isOptional: true
            parameterType: STRING
          postgres_host:
            defaultValue: rag-postgresql.external-db-generation-llm-rag.svc.cluster.local
            description: PostgreSQL server hostname
            isOptional: true
            parameterType: STRING
          postgres_password:
            defaultValue: ''
            description: Database password (should come from Secret)
            isOptional: true
            parameterType: STRING
          postgres_port:
            defaultValue: 5432.0
            description: PostgreSQL server port
            isOptional: true
            parameterType: NUMBER_INTEGER
          postgres_table_name:
            defaultValue: document_chunks
            description: 'Table name for storing chunks (default: document_chunks)'
            isOptional: true
            parameterType: STRING
          postgres_user:
            defaultValue: raguser
            description: Database user
            isOptional: true
            parameterType: STRING
    schemaVersion: 2.1.0
    sdkVersion: kfp-2.16.0
