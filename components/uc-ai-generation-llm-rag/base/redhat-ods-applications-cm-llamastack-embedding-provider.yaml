apiVersion: v1
kind: ConfigMap
metadata:
  name: llamastack-embedding-provider
  namespace: redhat-ods-applications
data:
  config.yaml: |
    image_name: rh
    providers:
      inference:
      - config:
          api_token: ""
          base_url: https://granite-embedding-predictor.ai-generation-llm-rag.svc.cluster.local:8443/v1
          max_tokens: 8192
          tls_verify: false
        provider_id: vllm-embedding
        provider_type: remote::vllm
