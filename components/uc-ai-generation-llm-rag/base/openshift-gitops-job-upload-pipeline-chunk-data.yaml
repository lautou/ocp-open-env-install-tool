apiVersion: batch/v1
kind: Job
metadata:
  annotations:
    argocd.argoproj.io/sync-options: Force=true
  name: upload-pipeline-chunk-data
  namespace: openshift-gitops
spec:
  template:
    spec:
      serviceAccountName: pipeline-uploader
      restartPolicy: Never
      initContainers:
      - name: fetch-pipeline
        image: registry.redhat.io/openshift4/ose-cli:latest
        command:
        - /bin/bash
        - -c
        - |
          set -e
          echo "Waiting for ConfigMap pipeline-chunk-data..."
          while ! oc get configmap pipeline-chunk-data -n ai-generation-llm-rag >/dev/null 2>&1; do
            echo "Waiting for ConfigMap pipeline-chunk-data..."
            sleep 5
          done
          echo "✅ ConfigMap found"

          echo "Fetching pipeline definition from ConfigMap..."
          oc get configmap pipeline-chunk-data -n ai-generation-llm-rag \
            -o jsonpath='{.data.pipeline\.yaml}' > /pipeline/pipeline.yaml

          if [ ! -s /pipeline/pipeline.yaml ]; then
            echo "ERROR: Pipeline definition is empty or not found"
            exit 1
          fi

          echo "✅ Pipeline definition fetched ($(wc -l < /pipeline/pipeline.yaml) lines)"
        volumeMounts:
        - name: pipeline-data
          mountPath: /pipeline
      containers:
      - name: upload-pipeline
        image: registry.access.redhat.com/ubi9/python-311:latest
        command:
        - /bin/bash
        - -c
        - |
          set -e

          echo "Waiting for DSPA API to be available..."
          while ! curl -s -k -o /dev/null -w "%{http_code}" https://ds-pipeline-pipelines.ai-generation-llm-rag.svc:8443/apis/v2beta1/pipelines | grep -q "200\|401\|403"; do
            echo "Waiting for DSPA API..."
            sleep 5
          done
          echo "✅ DSPA API is responding"

          echo "Using pipeline definition from init container..."
          if [ ! -s /pipeline/pipeline.yaml ]; then
            echo "ERROR: Pipeline definition not found in shared volume"
            exit 1
          fi

          echo "Pipeline definition available ($(wc -l < /pipeline/pipeline.yaml) lines)"

          echo "Installing KFP SDK..."
          pip install --quiet kfp==2.14.6

          python3 /scripts/upload-pipeline.py
        volumeMounts:
        - name: pipeline-data
          mountPath: /pipeline
          readOnly: true
        - name: upload-script
          mountPath: /scripts
          readOnly: true
        env:
        - name: PIPELINE_FILE
          value: /pipeline/pipeline.yaml
      volumes:
      - name: pipeline-data
        emptyDir: {}
      - name: upload-script
        configMap:
          name: pipeline-upload-script
          defaultMode: 0755
