data:
  upload-pipeline.py: |
    #!/usr/bin/env python3
    """
    Idempotent pipeline uploader for RHOAI Data Science Pipelines.
    """
    import kfp
    import hashlib
    import sys
    import os
    import yaml
    from pathlib import Path

    DSPA_HOST = "https://ds-pipeline-pipelines.ai-generation-llm-rag.svc:8443"
    PIPELINE_FILE = os.getenv("PIPELINE_FILE", "/tmp/pipelines/pipeline.yaml")

    def calculate_pipeline_hash(filepath):
        with open(filepath, 'rb') as f:
            return hashlib.sha256(f.read()).hexdigest()[:12]

    def extract_pipeline_name(filepath):
        """Extract pipeline name from KFP v2 YAML file (supports multi-document YAML)."""
        with open(filepath, 'r') as f:
            # Load first document only (pipelineInfo is in first doc)
            # Multi-document YAML files have platform configs in subsequent docs
            for doc in yaml.safe_load_all(f):
                if doc and 'pipelineInfo' in doc and 'name' in doc['pipelineInfo']:
                    return doc['pipelineInfo']['name']
        return None

    def main():
        pipeline_path = Path(PIPELINE_FILE)
        if not pipeline_path.exists():
            print(f"ERROR: Pipeline file not found: {PIPELINE_FILE}")
            sys.exit(1)

        # Extract pipeline name from YAML
        pipeline_name = extract_pipeline_name(PIPELINE_FILE)
        if not pipeline_name:
            print(f"ERROR: Could not extract pipeline name from {PIPELINE_FILE}")
            sys.exit(1)

        pipeline_hash = calculate_pipeline_hash(PIPELINE_FILE)
        version_name = f"v-{pipeline_hash}"

        print(f"Pipeline: {pipeline_name}")
        print(f"Version: {version_name}")
        print(f"DSPA: {DSPA_HOST}")

        # Read ServiceAccount token for authentication
        token_path = "/var/run/secrets/kubernetes.io/serviceaccount/token"
        with open(token_path, 'r') as f:
            token = f.read().strip()

        client = kfp.Client(host=DSPA_HOST, verify_ssl=False, existing_token=token)

        try:
            pipeline_id = client.get_pipeline_id(pipeline_name)
            if not pipeline_id:
                raise ValueError("Pipeline ID is None")
            print(f"Pipeline '{pipeline_name}' exists (ID: {pipeline_id})")

            try:
                versions_response = client.list_pipeline_versions(pipeline_id, page_size=100)

                # Handle both API response formats (versions vs pipeline_versions)
                existing_versions = []
                if hasattr(versions_response, 'versions') and versions_response.versions:
                    existing_versions = [v.name for v in versions_response.versions]
                elif hasattr(versions_response, 'pipeline_versions') and versions_response.pipeline_versions:
                    existing_versions = [v.display_name for v in versions_response.pipeline_versions]

                if existing_versions:
                    print(f"Found {len(existing_versions)} existing version(s)")

                    if version_name in existing_versions:
                        print(f"Version '{version_name}' already exists - skipping (idempotent)")
                        sys.exit(0)

                print(f"Uploading new version: {version_name}")
                client.upload_pipeline_version(
                    pipeline_package_path=PIPELINE_FILE,
                    pipeline_id=pipeline_id,
                    pipeline_version_name=version_name,
                    description=f"GitOps upload (hash: {pipeline_hash})"
                )
                print(f"Version '{version_name}' uploaded successfully")

            except Exception as e:
                print(f"ERROR listing/uploading versions: {e}")
                sys.exit(1)

        except Exception:
            print(f"Pipeline '{pipeline_name}' not found - creating new")
            try:
                uploaded_pipeline = client.upload_pipeline(
                    pipeline_package_path=PIPELINE_FILE,
                    pipeline_name=pipeline_name,
                    description=f"Pipeline: {pipeline_name}"
                )
                print(f"Pipeline '{pipeline_name}' created (ID: {uploaded_pipeline.pipeline_id})")

            except Exception as e:
                print(f"ERROR creating pipeline: {e}")
                sys.exit(1)

        print("Pipeline upload completed successfully")

    if __name__ == "__main__":
        main()
