apiVersion: batch/v1
kind: Job
metadata:
  name: upload-pipeline-docling-standard
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  template:
    spec:
      serviceAccountName: pipeline-uploader
      restartPolicy: Never
      containers:
      - name: upload-pipeline
        image: registry.access.redhat.com/ubi9/python-311:latest
        command:
        - /bin/bash
        - -c
        - |
          set -e

          echo "Waiting for DSPA API to be available..."
          timeout=180
          while [ $timeout -gt 0 ]; do
            if curl -s -k -o /dev/null -w "%{http_code}" https://ds-pipeline-pipelines.ai-generation-llm-rag.svc:8443/apis/v2beta1/pipelines | grep -q "200\|401\|403"; then
              echo "DSPA API is responding"
              break
            fi
            echo "Waiting... ($timeout seconds remaining)"
            sleep 5
            timeout=$((timeout - 5))
          done

          if [ $timeout -le 0 ]; then
            echo "ERROR: Timeout waiting for DSPA API"
            exit 1
          fi

          echo "Copying pipeline definition from mounted ConfigMap..."
          mkdir -p /tmp/pipelines
          cp /pipeline/pipeline.yaml /tmp/pipelines/pipeline.yaml

          if [ ! -s /tmp/pipelines/pipeline.yaml ]; then
            echo "ERROR: Pipeline definition is empty or not found"
            exit 1
          fi

          echo "Pipeline definition fetched ($(wc -l < /tmp/pipelines/pipeline.yaml) lines)"

          echo "Installing KFP SDK..."
          pip install --quiet kfp==2.14.6

          python3 /scripts/upload-pipeline.py
        volumeMounts:
        - name: pipeline-definition
          mountPath: /pipeline
          readOnly: true
        - name: upload-script
          mountPath: /scripts
          readOnly: true
        env:
        - name: PIPELINE_FILE
          value: /tmp/pipelines/pipeline.yaml
      volumes:
      - name: pipeline-definition
        configMap:
          name: pipeline-docling-standard
      - name: upload-script
        configMap:
          name: pipeline-upload-script
          defaultMode: 0755
