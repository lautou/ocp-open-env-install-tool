apiVersion: config.openshift.io/v1
kind: APIServer
metadata:
  annotations:
    argocd.argoproj.io/sync-options: Delete=false,SkipDryRunOnMissingResource=true
  name: cluster
spec:
  servingCerts:
    namedCertificates:
    - names:
      - CMP_PLACEHOLDER_OCP_API_DOMAIN
      servingCertificate:
        name: api-certificates
