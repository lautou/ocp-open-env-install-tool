apiVersion: v1
kind: Secret
metadata:
  name: support
  namespace: openshift-config
type: Opaque
stringData:
  config.yaml: |
    # Insights Operator Configuration
    # Disable specific Insights recommendations that are false positives or known issues
    # See KNOWN_BUGS.md for details on each disabled recommendation

    insights:
      disabled_recommendations:
        # ===== DISABLED INSIGHTS RECOMMENDATIONS - START =====

        # JIRA: OCPKUEUE-578
        # Component: Kueue Operator
        # Rule: webhook_timeout_is_larger_than_default
        # Issue: Webhook timeout exceeds 13s recommendation
        # Impact: False-positive moderate risk recommendation
        # Reason: Kueue webhooks require longer timeout for complex validations
        - rule_id: "ccx_rules_ocp.external.rules.webhook_timeout_is_larger_than_default"

        # Component: Insights Operator
        # Rule: io_415_change_config_location
        # Issue: Recommendation to migrate from Secret to ConfigMap
        # Impact: False-positive low risk recommendation
        # Reason: OCP 4.20 Insights Operator still uses Secret (not ConfigMap)
        # Despite documentation mentioning ConfigMap migration in 4.15+, the operator
        # implementation in 4.20 still expects Secret. See CLAUDE.md for details.
        - rule_id: "ccx_rules_ocp.external.rules.io_415_change_config_location"

        # Component: Machine Config Operator
        # Rule: machineconfigpool_maxunavailable
        # Issue: MachineConfigPool with null maxUnavailable (uses default=1)
        # Impact: False-positive moderate risk recommendation
        # Reason: null maxUnavailable defaults to 1, which is correct for controlled updates
        # The recommendation warns about unavailableMachineCount > maxUnavailable, but
        # both pools are fully updated (unavailableMachineCount=0) with no actual issue
        - rule_id: "ccx_rules_ocp.external.rules.machineconfigpool_maxunavailable"

        # ===== DISABLED INSIGHTS RECOMMENDATIONS - END =====
