apiVersion: v1
kind: Secret
metadata:
  name: support
  namespace: openshift-config
type: Opaque
stringData:
  config.yaml: |
    # Insights Operator Configuration
    # Disable specific Insights recommendations that are false positives or known issues
    # See KNOWN_BUGS.md for details on each disabled recommendation

    insights:
      disabled_recommendations:
        # ===== DISABLED INSIGHTS RECOMMENDATIONS - START =====

        # JIRA: OCPKUEUE-578
        # Component: Kueue Operator
        # Rule: webhook_timeout_is_larger_than_default
        # Issue: Webhook timeout exceeds 13s recommendation
        # Impact: False-positive moderate risk recommendation
        # Reason: Kueue webhooks require longer timeout for complex validations
        - rule_id: "ccx_rules_ocp.external.rules.webhook_timeout_is_larger_than_default"

        # Component: Insights Operator
        # Rule: io_415_change_config_location
        # Issue: Recommendation to migrate Insights config from secret to configmap
        # Impact: Low risk recommendation about config location
        # Reason: support Secret is still valid for disabled_recommendations config
        # Note: General Insights config uses ConfigMap, disabled rules use Secret (both are correct)
        - rule_id: "ccx_rules_ocp.external.rules.io_415_change_config_location"

        # Add additional disabled recommendations here with similar documentation

        # ===== DISABLED INSIGHTS RECOMMENDATIONS - END =====
