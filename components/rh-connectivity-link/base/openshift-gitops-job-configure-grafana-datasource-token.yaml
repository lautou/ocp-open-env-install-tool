apiVersion: batch/v1
kind: Job
metadata:
  annotations:
    argocd.argoproj.io/sync-options: Force=true
  name: configure-grafana-datasource-token
  namespace: openshift-gitops
spec:
  template:
    spec:
      containers:
      - command:
        - /bin/bash
        - -c
        - |
          set -e

          echo "Using Thanos Querier internal service URL..."
          HOST="https://thanos-querier.openshift-monitoring.svc:9091"
          echo "Thanos Querier URL: $HOST"

          echo "Waiting for grafana-datasource ServiceAccount..."
          while ! oc get serviceaccount grafana-datasource -n monitoring >/dev/null 2>&1; do
            echo "Waiting for ServiceAccount grafana-datasource..."
            sleep 5
          done
          echo "✅ ServiceAccount found"

          echo "Waiting for ServiceAccount token secret to be created..."
          while true; do
            TOKEN_SECRET=$(oc get serviceaccount grafana-datasource -n monitoring -o jsonpath='{.secrets[?(@.name=="grafana-datasource-token")].name}' 2>/dev/null || echo "")
            if [ -z "$TOKEN_SECRET" ]; then
              # Fallback: look for token secrets (with or without suffix)
              TOKEN_SECRET=$(oc get secrets -n monitoring -o name 2>/dev/null | grep "grafana-datasource-token" | head -1 | cut -d'/' -f2)
            fi
            if [ -n "$TOKEN_SECRET" ]; then
              echo "✅ Found token secret: $TOKEN_SECRET"
              break
            fi
            echo "Token secret not found, waiting..."
            sleep 5
          done

          echo "Extracting token from secret $TOKEN_SECRET..."
          TOKEN=$(oc get secret "$TOKEN_SECRET" -n monitoring -o jsonpath='{.data.token}' | base64 -d)

          if [ -z "$TOKEN" ]; then
            echo "ERROR: Token is empty"
            exit 1
          fi

          echo "Waiting for GrafanaDatasource to exist..."
          while ! oc get grafanadatasource thanos-query-ds -n monitoring >/dev/null 2>&1; do
            echo "Waiting for GrafanaDatasource thanos-query-ds..."
            sleep 5
          done
          echo "✅ GrafanaDatasource found"

          echo "Patching GrafanaDatasource with Route URL and Bearer token..."
          oc patch grafanadatasource thanos-query-ds -n monitoring --type=merge -p "{\"spec\":{\"datasource\":{\"url\":\"$HOST\",\"secureJsonData\":{\"httpHeaderValue1\":\"Bearer $TOKEN\"}}}}"

          echo "GrafanaDatasource configured successfully with URL: $HOST"
        image: registry.redhat.io/openshift4/ose-cli:latest
        name: configure-datasource
      restartPolicy: Never
      serviceAccountName: grafana-datasource-configurator
