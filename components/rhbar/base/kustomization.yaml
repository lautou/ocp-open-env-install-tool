apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../common
- cluster-namespace-rhbar-operator.yaml
- rhbar-operator-operatorgroup-rhbar-operator.yaml
- rhbar-operator-subscription-rhbar-operator.yaml
replacements:
- source:
    fieldPath: data.rhbar
    kind: ConfigMap
    name: cluster-versions
  targets:
  - fieldPaths:
    - spec.channel
    select:
      kind: Subscription
      name: rhbar-operator
