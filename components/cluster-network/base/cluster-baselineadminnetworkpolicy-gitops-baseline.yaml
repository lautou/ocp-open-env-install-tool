apiVersion: policy.networking.k8s.io/v1alpha1
kind: BaselineAdminNetworkPolicy
metadata:
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
  name: default
spec:
  # Apply to namespaces explicitly opted-in to GitOps network policies
  subject:
    namespaces:
      matchLabels:
        network-policy.gitops/enforce: "true"

  # Egress rules (processed AFTER AdminNetworkPolicy and NetworkPolicy)
  egress:
  - name: deny-all-other-egress
    action: Deny
    to:
    - networks:
      - 0.0.0.0/0
