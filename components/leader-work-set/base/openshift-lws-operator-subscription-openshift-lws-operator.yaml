apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: lws-operator
  namespace: openshift-lws-operator
spec:
  channel: stable-v1.0
  config:
    nodeSelector:
      node-role.kubernetes.io/infra: ''
    tolerations:
    - key: node-role.kubernetes.io/infra
      operator: Exists
  name: lws-operator
  source: redhat-operators
  sourceNamespace: openshift-marketplace
