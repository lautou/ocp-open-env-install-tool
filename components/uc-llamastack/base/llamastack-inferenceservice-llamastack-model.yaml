apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    opendatahub.io/hardware-profile-name: gpus
    opendatahub.io/hardware-profile-namespace: redhat-ods-applications
    opendatahub.io/model-type: generative
    openshift.io/description: IBM Granite 3.1 8B Instruct (AWQ 4-bit quantized) with tool calling support
    openshift.io/display-name: llamastack-model
    security.opendatahub.io/enable-auth: "true"
    serving.kserve.io/deploymentMode: RawDeployment
  name: llamastack-model
  namespace: llamastack
spec:
  predictor:
    automountServiceAccountToken: true
    deploymentStrategy:
      type: RollingUpdate
    maxReplicas: 1
    minReplicas: 1
    serviceAccountName: llamastack-model-sa
    model:
      args:
      - --max-model-len=20000
      - --gpu-memory-utilization=0.80
      - --enable-auto-tool-choice
      - --tool-call-parser=granite
      - --chat-template=/app/data/template/tool_chat_template_granite.jinja
      - --max-num-seqs=128
      modelFormat:
        name: vLLM
      name: ""
      resources:
        limits:
          cpu: "2"
          memory: 12Gi
          nvidia.com/gpu: "1"
        requests:
          cpu: "2"
          memory: 10Gi
          nvidia.com/gpu: "1"
      runtime: llamastack-model
      storageUri: oci://quay.io/redhat-ai-services/modelcar-catalog:granite-3.1-8b-instruct-quantized.w4a16
    tolerations:
    - key: nvidia.com/gpu
      operator: Exists
