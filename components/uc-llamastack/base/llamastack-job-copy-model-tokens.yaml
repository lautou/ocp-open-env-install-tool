apiVersion: batch/v1
kind: Job
metadata:
  annotations:
    argocd.argoproj.io/sync-options: Force=true
  name: copy-model-tokens
  namespace: openshift-gitops
spec:
  template:
    metadata:
      name: copy-model-tokens
    spec:
      containers:
      - command:
        - /bin/bash
        - -c
        - |
          set -e

          # Wait for InferenceServices to exist (may not be created yet on fresh install)
          echo "Waiting for granite-llm InferenceService to exist..."
          until oc get inferenceservice.serving.kserve.io granite-llm -n ai-models-service >/dev/null 2>&1; do
            sleep 10
          done

          echo "Waiting for granite-embedding InferenceService to exist..."
          until oc get inferenceservice.serving.kserve.io granite-embedding -n ai-models-service >/dev/null 2>&1; do
            sleep 10
          done

          # Wait for both InferenceServices to be Ready (model fully loaded on GPU)
          echo "Waiting for granite-llm to be Ready (model loading)..."
          oc wait inferenceservice.serving.kserve.io/granite-llm \
            -n ai-models-service --for=condition=Ready --timeout=60m

          echo "Waiting for granite-embedding to be Ready (model loading)..."
          oc wait inferenceservice.serving.kserve.io/granite-embedding \
            -n ai-models-service --for=condition=Ready --timeout=60m

          # Extract tokens (base64 encoded) from now-valid SA token secrets
          echo "Copying granite model service account tokens to llamastack namespace..."
          EMBEDDING_TOKEN=$(oc get secret granite-embedding-sa-token -n ai-models-service -o jsonpath='{.data.token}')
          LLM_TOKEN=$(oc get secret granite-llm-sa-token -n ai-models-service -o jsonpath='{.data.token}')

          # Update secrets in llamastack namespace using json patch (reliable across secret types)
          oc patch secret granite-embedding-sa-token -n llamastack \
            --type=json -p "[{\"op\": \"replace\", \"path\": \"/data/token\", \"value\": \"$EMBEDDING_TOKEN\"}]"
          oc patch secret granite-llm-sa-token -n llamastack \
            --type=json -p "[{\"op\": \"replace\", \"path\": \"/data/token\", \"value\": \"$LLM_TOKEN\"}]"

          echo "Tokens copied successfully!"

          # Restart LlamaStack pod so it picks up the new token env vars
          # (env vars from secretKeyRef are not live-updated by Kubernetes)
          echo "Restarting LlamaStack to reload token env vars..."
          oc delete pod -n llamastack -l app=llamastack --ignore-not-found=true

          echo "Done. LlamaStack will restart with valid vLLM tokens."
        image: image-registry.openshift-image-registry.svc:5000/openshift/tools:latest
        name: copy-tokens
      restartPolicy: Never
      serviceAccountName: openshift-gitops-argocd-application-controller
