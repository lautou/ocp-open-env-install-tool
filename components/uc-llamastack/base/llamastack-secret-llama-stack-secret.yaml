apiVersion: v1
kind: Secret
metadata:
  annotations:
    # gitleaks:allow - Demo/lab environment service account tokens (cluster-internal only)
    security.internal/credential-type: service-account-token
  name: llama-stack-secret
  namespace: llamastack
stringData:
  EMBEDDING_MODEL: granite-embedding
  EMBEDDING_PROVIDER_MODEL_ID: granite-embedding
  INFERENCE_MODEL: llamastack-model
  VLLM_API_TOKEN: PLACEHOLDER_LLAMASTACK_MODEL_TOKEN
  VLLM_EMBEDDING_API_TOKEN: PLACEHOLDER_GRANITE_EMBEDDING_TOKEN
  VLLM_EMBEDDING_MAX_TOKENS: "512"
  VLLM_EMBEDDING_TLS_VERIFY: "false"
  VLLM_EMBEDDING_URL: https://granite-embedding-predictor.llamastack.svc.cluster.local:8443/v1
  VLLM_MAX_TOKENS: "20000"
  VLLM_TLS_VERIFY: "false"
  VLLM_URL: https://llamastack-model-predictor.llamastack.svc.cluster.local:8443/v1
type: Opaque
