apiVersion: batch/v1
kind: Job
metadata:
  annotations:
    argocd.argoproj.io/hook: PostDelete
    argocd.argoproj.io/sync-options: Force=true
  name: delete-openshift-builds-resources
  namespace: openshift-gitops
spec:
  template:
    metadata:
      name: delete-openshift-builds-resources
    spec:
      containers:
      - command:
        - /bin/bash
        - -c
        - |
          oc delete openshiftbuild cluster --cascade=foreground --ignore-not-found
          oc delete namespace openshift-builds --ignore-not-found
        image: registry.redhat.io/openshift4/ose-cli:latest
        name: delete-openshift-builds-resources
      nodeSelector:
        node-role.kubernetes.io/infra: ''
      restartPolicy: Never
      serviceAccountName: cleanup-operator
      tolerations:
      - key: node-role.kubernetes.io/infra
        operator: Exists
