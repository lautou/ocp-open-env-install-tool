apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manage-openshiftbuilds
rules:
# OpenShift Builds operator CR
- apiGroups:
  - operator.openshift.io
  resources:
  - openshiftbuilds
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
# Shipwright CRDs (per Red Hat docs: delete CRDs to trigger cleanup)
- apiGroups:
  - apiextensions.k8s.io
  resources:
  - customresourcedefinitions
  verbs:
  - delete
  - get
  - list
  - patch
# OLM resources (Subscription, CSV, OperatorGroup)
- apiGroups:
  - operators.coreos.com
  resources:
  - subscriptions
  - clusterserviceversions
  - operatorgroups
  verbs:
  - delete
  - get
  - list
# Namespace and pods
- apiGroups:
  - ""
  resources:
  - namespaces
  - pods
  verbs:
  - delete
  - get
  - list
  - patch
