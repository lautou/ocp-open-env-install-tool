apiVersion: k8s.keycloak.org/v2alpha1
kind: Keycloak
metadata:
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
  labels:
    app: keycloak
  name: keycloak
  namespace: keycloak
spec:
  db:
    vendor: postgres
    host: keycloak-db.databases-keycloak.svc
    database: keycloak
    usernameSecret:
      name: keycloak-db-secret
      key: database-user
    passwordSecret:
      name: keycloak-db-secret
      key: database-password
  hostname:
    strict: false
  http:
    httpEnabled: true
  ingress:
    enabled: false
  instances: 1
