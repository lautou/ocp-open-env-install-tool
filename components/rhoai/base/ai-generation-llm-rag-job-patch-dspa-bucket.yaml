apiVersion: batch/v1
kind: Job
metadata:
  name: patch-dspa-bucket-name
  namespace: ai-generation-llm-rag
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  template:
    spec:
      serviceAccountName: default
      restartPolicy: Never
      containers:
      - name: patch-bucket
        image: registry.redhat.io/openshift4/ose-cli:latest
        command:
        - /bin/bash
        - -c
        - |
          set -e

          echo "Waiting for pipeline-runner-pipelines service account..."
          timeout=120
          while [ $timeout -gt 0 ]; do
            if oc get serviceaccount pipeline-runner-pipelines -n ai-generation-llm-rag >/dev/null 2>&1; then
              echo "Service account found"
              break
            fi
            echo "Waiting... ($timeout seconds remaining)"
            sleep 5
            timeout=$((timeout - 5))
          done

          if [ $timeout -le 0 ]; then
            echo "ERROR: Timeout waiting for service account"
            exit 1
          fi

          echo "Waiting for OBC ConfigMap to be created..."
          timeout=60
          while [ $timeout -gt 0 ]; do
            if oc get configmap pipeline-artifacts -n ai-generation-llm-rag >/dev/null 2>&1; then
              echo "ConfigMap found"
              break
            fi
            echo "Waiting... ($timeout seconds remaining)"
            sleep 5
            timeout=$((timeout - 5))
          done

          if [ $timeout -le 0 ]; then
            echo "ERROR: Timeout waiting for pipeline-artifacts ConfigMap"
            exit 1
          fi

          # Get bucket name from OBC ConfigMap
          BUCKET_NAME=$(oc get configmap pipeline-artifacts -n ai-generation-llm-rag -o jsonpath='{.data.BUCKET_NAME}')

          if [ -z "$BUCKET_NAME" ]; then
            echo "ERROR: BUCKET_NAME not found in ConfigMap"
            exit 1
          fi

          echo "Bucket name: $BUCKET_NAME"

          # Wait for DSPA to exist
          echo "Waiting for DSPA to be created..."
          timeout=60
          while [ $timeout -gt 0 ]; do
            if oc get datasciencepipelinesapplication pipelines -n ai-generation-llm-rag >/dev/null 2>&1; then
              echo "DSPA found"
              break
            fi
            echo "Waiting... ($timeout seconds remaining)"
            sleep 5
            timeout=$((timeout - 5))
          done

          if [ $timeout -le 0 ]; then
            echo "ERROR: Timeout waiting for DSPA"
            exit 1
          fi

          # Patch DSPA with bucket name
          echo "Patching DSPA with bucket name..."
          oc patch datasciencepipelinesapplication pipelines -n ai-generation-llm-rag --type=json \
            -p='[{"op": "replace", "path": "/spec/objectStorage/externalStorage/bucket", "value": "'$BUCKET_NAME'"}]'

          echo "DSPA patched successfully with bucket: $BUCKET_NAME"
