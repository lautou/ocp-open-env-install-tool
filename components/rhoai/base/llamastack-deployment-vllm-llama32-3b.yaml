apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: vllm-llama32-3b
  name: vllm-llama32-3b
  namespace: llamastack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm-llama32-3b
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: vllm-llama32-3b
    spec:
      containers:
      - args:
        - serve
        - ibm-granite/granite-3.3-2b-instruct
        - --host
        - 0.0.0.0
        - --port
        - "8000"
        - --max-model-len
        - "4096"
        - --gpu-memory-utilization
        - "0.9"
        - --dtype
        - half
        command:
        - vllm
        env:
        - name: HF_HUB_OFFLINE
          value: "0"
        image: quay.io/opendatahub/vllm:stable
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          failureThreshold: 5
          initialDelaySeconds: 300
          periodSeconds: 30
          timeoutSeconds: 10
        name: vllm
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          failureThreshold: 5
          initialDelaySeconds: 120
          periodSeconds: 10
          timeoutSeconds: 5
        resources:
          limits:
            cpu: "4"
            memory: 16Gi
            nvidia.com/gpu: "1"
          requests:
            cpu: "2"
            memory: 8Gi
            nvidia.com/gpu: "1"
        volumeMounts:
        - mountPath: /dev/shm
          name: dshm
      nodeSelector: {}
      tolerations:
      - key: nvidia.com/gpu
        operator: Exists
      volumes:
      - emptyDir:
          medium: Memory
          sizeLimit: 8Gi
        name: dshm
