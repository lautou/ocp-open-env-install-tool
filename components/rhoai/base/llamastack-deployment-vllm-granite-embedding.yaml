apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: vllm-granite-embedding
  name: vllm-granite-embedding
  namespace: llamastack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm-granite-embedding
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: vllm-granite-embedding
    spec:
      containers:
      - args:
        - serve
        - ibm-granite/granite-embedding-125m-english
        - --host
        - 0.0.0.0
        - --port
        - "8001"
        - --dtype
        - half
        command:
        - vllm
        env:
        - name: HF_HUB_OFFLINE
          value: "0"
        image: quay.io/opendatahub/vllm:stable
        livenessProbe:
          httpGet:
            path: /health
            port: 8001
          failureThreshold: 5
          initialDelaySeconds: 180
          periodSeconds: 30
          timeoutSeconds: 10
        name: vllm
        ports:
        - containerPort: 8001
          name: http
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /health
            port: 8001
          failureThreshold: 5
          initialDelaySeconds: 120
          periodSeconds: 10
          timeoutSeconds: 5
        resources:
          limits:
            cpu: "2"
            memory: 8Gi
            nvidia.com/gpu: "1"
          requests:
            cpu: "1"
            memory: 4Gi
            nvidia.com/gpu: "1"
        volumeMounts:
        - mountPath: /dev/shm
          name: dshm
      nodeSelector: {}
      tolerations:
      - key: nvidia.com/gpu
        operator: Exists
      volumes:
      - emptyDir:
          medium: Memory
          sizeLimit: 4Gi
        name: dshm
