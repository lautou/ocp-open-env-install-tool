apiVersion: batch/v1
kind: Job
metadata:
  annotations:
    argocd.argoproj.io/hook: PreDelete
    argocd.argoproj.io/hook-delete-policy: HookSucceeded,HookFailed
    argocd.argoproj.io/sync-options: Force=true
  name: delete-rhoai-resources
  namespace: openshift-gitops
spec:
  template:
    metadata:
      name: delete-rhoai-resources
    spec:
      containers:
      - command:
        - /bin/bash
        - -c
        - |
          set -e

          echo "================================================"
          echo "Red Hat OpenShift AI Cleanup - Official Procedure"
          echo "================================================"
          echo ""
          echo "Following Red Hat documentation:"
          echo "docs.redhat.com/en/documentation/red_hat_openshift_ai_self-managed/3.4/html/"
          echo "installing_and_uninstalling_openshift_ai_self-managed/"
          echo "uninstalling-openshift-ai-self-managed_uninstalling-openshift-ai-self-managed"
          echo "#uninstalling-openshift-ai-self-managed-using-cli_uninstalling-openshift-ai-self-managed"
          echo ""
          echo "Using PreDelete hook to run BEFORE ArgoCD deletes resources."
          echo "This ensures proper deletion order per Red Hat docs."
          echo ""
          echo "CRITICAL: User workload Applications (uc-*, ai-models-service) should be"
          echo "deleted BEFORE the rhoai Application. If not, workloads will be orphaned."
          echo "This hook will attempt cleanup, but proper ordering is recommended."
          echo ""

          # Step 0: Clean up user workload namespaces
          # Per Red Hat docs: "Red Hat recommends that you review the projects and custom
          # resources in your OpenShift cluster and delete anything no longer in use to
          # prevent potential issues, such as pipelines that cannot run, notebooks that
          # cannot be undeployed, or models that cannot be undeployed."
          echo "Step 0: Cleaning up user workload namespaces (if any remain)..."

          USER_WORKLOAD_NAMESPACES=(
            "ai-generation-llm-rag"
            "llamastack"
            "external-db-generation-llm-rag"
            "external-db-llamastack"
            "ai-models-service"
          )

          for ns in "${USER_WORKLOAD_NAMESPACES[@]}"; do
            if oc get namespace $ns &>/dev/null; then
              echo "  ⚠️  Found user workload namespace: $ns (should have been deleted first)"
              echo "    Force-cleaning resources..."

              # Delete all resources
              oc delete all --all -n $ns --force --grace-period=0 --ignore-not-found 2>&1 | grep -v "No resources found" || true
              oc delete pvc --all -n $ns --force --grace-period=0 --ignore-not-found 2>&1 | grep -v "No resources found" || true

              # Remove finalizers from namespace
              oc patch namespace $ns --type=json -p='[{"op": "remove", "path": "/metadata/finalizers"}]' 2>/dev/null || true
              oc patch namespace $ns --type=json -p='[{"op": "remove", "path": "/spec/finalizers"}]' 2>/dev/null || true

              # Delete namespace
              oc delete namespace $ns --force --grace-period=0 --ignore-not-found 2>&1 || true

              echo "    ✅ Cleaned $ns"
            fi
          done

          echo "  ✅ User workload cleanup completed"
          echo ""

          # Step 1: Delete the DataScienceCluster CR
          # Per Red Hat docs: "Delete the DataScienceCluster instance in OpenShift AI"
          echo "Step 1: Deleting DataScienceCluster CR..."
          if oc get datasciencecluster.opendatahub.io default-dsc &>/dev/null; then
            # Try normal deletion first (gives operator time to cleanup)
            oc delete datasciencecluster.opendatahub.io default-dsc --timeout=120s --ignore-not-found 2>&1 || {
              echo "  ⚠️  DataScienceCluster deletion timed out, removing finalizers..."
              oc patch datasciencecluster.opendatahub.io default-dsc --type=json -p='[{"op": "remove", "path": "/metadata/finalizers"}]' 2>/dev/null || true
              oc delete datasciencecluster.opendatahub.io default-dsc --ignore-not-found --grace-period=0 --force 2>/dev/null || true
            }
            echo "  ✅ DataScienceCluster deleted"
          else
            echo "  ℹ️  DataScienceCluster not found"
          fi
          echo ""

          # Step 2: Wait for operator cleanup
          echo "Step 2: Waiting for RHOAI operator cleanup (60s grace period)..."
          echo "  Allowing time for operator to handle finalizers and cleanup..."
          sleep 60
          echo "  ✅ Grace period completed"
          echo ""

          # Step 3: Delete RHOAI operator Subscription
          # Per Red Hat docs: "Delete the Subscription object"
          echo "Step 3: Deleting RHOAI operator Subscription..."
          if oc get subscription.operators.coreos.com rhods-operator -n redhat-ods-operator &>/dev/null; then
            oc delete subscription.operators.coreos.com rhods-operator -n redhat-ods-operator --ignore-not-found --timeout=30s 2>&1 || true
            echo "  ✅ Subscription deleted"
          else
            echo "  ℹ️  Subscription not found"
          fi
          echo ""

          # Step 4: Delete ClusterServiceVersion
          # Per Red Hat docs: "Delete the ClusterServiceVersion object"
          echo "Step 4: Deleting RHOAI CSV..."
          CSV_NAME=$(oc get csv.operators.coreos.com -n redhat-ods-operator -o name 2>/dev/null | grep rhods-operator || echo "")
          if [ -n "$CSV_NAME" ]; then
            oc delete $CSV_NAME -n redhat-ods-operator --ignore-not-found --timeout=60s 2>&1 || true
            echo "  ✅ CSV deleted: $CSV_NAME"
          else
            echo "  ℹ️  CSV not found"
          fi
          echo ""

          # Step 5: Wait for operator pods to terminate
          echo "Step 5: Waiting for RHOAI operator pods to terminate..."
          if oc get pods -n redhat-ods-operator &>/dev/null; then
            oc wait --for=delete pod --all -n redhat-ods-operator --timeout=120s 2>/dev/null || {
              echo "  ⚠️  Timeout waiting for pods, force deleting..."
              oc delete pod --all -n redhat-ods-operator --grace-period=0 --force 2>/dev/null || true
            }
            echo "  ✅ Operator pods terminated"
          else
            echo "  ℹ️  No operator pods found"
          fi
          echo ""

          # Step 6: Delete OperatorGroup
          echo "Step 6: Deleting OperatorGroup..."
          if oc get operatorgroup.operators.coreos.com rhods-operator -n redhat-ods-operator &>/dev/null; then
            oc delete operatorgroup.operators.coreos.com rhods-operator -n redhat-ods-operator --ignore-not-found --timeout=30s 2>&1 || true
            echo "  ✅ OperatorGroup deleted"
          else
            echo "  ℹ️  OperatorGroup not found"
          fi
          echo ""

          # Step 7: Delete webhooks (prevent namespace termination deadlock)
          echo "Step 7: Deleting RHOAI webhooks..."

          # Delete ValidatingWebhookConfigurations
          VALIDATING_WEBHOOKS=$(oc get validatingwebhookconfiguration -o name 2>/dev/null | grep -E "opendatahub|kserve|rhoai" || echo "")
          if [ -n "$VALIDATING_WEBHOOKS" ]; then
            for webhook in $VALIDATING_WEBHOOKS; do
              oc delete $webhook --ignore-not-found 2>&1 || true
              echo "  ✅ Deleted: $webhook"
            done
          else
            echo "  ℹ️  No validating webhooks found"
          fi

          # Delete MutatingWebhookConfigurations
          MUTATING_WEBHOOKS=$(oc get mutatingwebhookconfiguration -o name 2>/dev/null | grep -E "opendatahub|kserve|rhoai" || echo "")
          if [ -n "$MUTATING_WEBHOOKS" ]; then
            for webhook in $MUTATING_WEBHOOKS; do
              oc delete $webhook --ignore-not-found 2>&1 || true
              echo "  ✅ Deleted: $webhook"
            done
          else
            echo "  ℹ️  No mutating webhooks found"
          fi
          echo ""

          # Step 8: Delete namespaces with finalizer cleanup
          echo "Step 8: Deleting RHOAI namespaces..."

          NAMESPACES=(
            "redhat-ods-operator"
            "redhat-ods-applications"
            "ai-generation-llm-rag"
            "llamastack"
            "external-rhoai-db"
          )

          for ns in "${NAMESPACES[@]}"; do
            if oc get namespace $ns &>/dev/null; then
              echo "  Deleting namespace: $ns"
              # Try normal deletion
              oc delete namespace $ns --timeout=120s 2>&1 || {
                echo "    ⚠️  Namespace deletion timed out, removing finalizers..."
                # Remove finalizers
                oc patch namespace $ns --type=json -p='[{"op": "remove", "path": "/metadata/finalizers"}]' 2>/dev/null || true
                oc patch namespace $ns --type=json -p='[{"op": "remove", "path": "/spec/finalizers"}]' 2>/dev/null || true
                # Force delete
                oc delete namespace $ns --grace-period=0 --force 2>/dev/null || true
              }

              # Wait and verify
              for i in {1..30}; do
                if ! oc get namespace $ns &>/dev/null; then
                  echo "    ✅ Namespace $ns deleted"
                  break
                fi
                if [ $i -eq 30 ]; then
                  echo "    ⚠️  Namespace $ns still exists after cleanup attempts"
                fi
                sleep 2
              done
            else
              echo "  ℹ️  Namespace $ns not found"
            fi
          done
          echo ""

          # Step 9: Delete RHOAI CRDs
          # Per Red Hat docs: "Delete the CRDs"
          echo "Step 9: Deleting RHOAI CRDs..."

          # Function to safely delete CRD with finalizer cleanup
          safe_delete_crd() {
            local crd_name=$1

            if oc get crd $crd_name &>/dev/null; then
              echo "  Deleting CRD: $crd_name"
              # Try normal deletion first
              oc delete crd $crd_name --timeout=60s --ignore-not-found 2>&1 || {
                echo "    ⚠️  CRD deletion timed out, removing finalizers..."
                oc patch crd $crd_name --type=json -p='[{"op": "remove", "path": "/metadata/finalizers"}]' 2>/dev/null || true
                oc delete crd $crd_name --ignore-not-found --grace-period=0 --force 2>/dev/null || true
              }
              echo "    ✅ CRD $crd_name deleted"
            fi
          }

          # Delete OpenDataHub/RHOAI CRDs
          RHOAI_CRDS=$(oc get crd -o name 2>/dev/null | grep -E "opendatahub.io|kubeflow.org|datasciencecluster.opendatahub.io" || echo "")
          if [ -n "$RHOAI_CRDS" ]; then
            for crd in $RHOAI_CRDS; do
              crd_name=$(echo $crd | sed 's|customresourcedefinition.apiextensions.k8s.io/||')
              safe_delete_crd "$crd_name"
            done
          else
            echo "  ℹ️  No RHOAI CRDs found"
          fi
          echo ""

          # Step 10: Verification
          echo "Step 10: Verifying cleanup..."
          CLEANUP_SUCCESS=true

          # Check namespaces
          for ns in "${NAMESPACES[@]}"; do
            if oc get namespace $ns &>/dev/null; then
              echo "  ⚠️  Namespace $ns still exists"
              CLEANUP_SUCCESS=false
            fi
          done

          if [ "$CLEANUP_SUCCESS" = true ]; then
            echo "  ✅ All namespaces removed"
          fi

          # Check webhooks
          REMAINING_WEBHOOKS=$(oc get validatingwebhookconfiguration,mutatingwebhookconfiguration -o name 2>/dev/null | grep -E "opendatahub|kserve|rhoai" || echo "")
          if [ -n "$REMAINING_WEBHOOKS" ]; then
            echo "  ⚠️  Some webhooks still exist:"
            echo "$REMAINING_WEBHOOKS" | sed 's/^/      /'
            CLEANUP_SUCCESS=false
          else
            echo "  ✅ All webhooks removed"
          fi

          echo ""

          if [ "$CLEANUP_SUCCESS" = true ]; then
            echo "================================================"
            echo "✅ RHOAI cleanup completed successfully"
            echo "================================================"
          else
            echo "================================================"
            echo "⚠️  RHOAI cleanup completed with warnings"
            echo "   Manual verification recommended"
            echo "================================================"
            exit 0  # Don't fail the Job on warnings
          fi
        image: registry.redhat.io/openshift4/ose-cli:latest
        name: delete-rhoai-resources
      nodeSelector:
        node-role.kubernetes.io/infra: ''
      restartPolicy: Never
      serviceAccountName: cleanup-operator
      tolerations:
      - key: node-role.kubernetes.io/infra
        operator: Exists
