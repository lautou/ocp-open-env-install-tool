apiVersion: batch/v1
kind: Job
metadata:
  annotations:
    argocd.argoproj.io/sync-options: Force=true
  name: maas-db-secret
  namespace: openshift-gitops
spec:
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      name: maas-db-secret
    spec:
      serviceAccountName: maas-db-secret
      restartPolicy: Never
      containers:
      - name: create-secret
        image: registry.redhat.io/openshift4/ose-cli:latest
        command:
        - /bin/bash
        - -c
        - |
          set -e

          echo "Waiting for maas-postgresql-credentials secret in external-db-maas..."
          while ! oc get secret maas-postgresql-credentials -n external-db-maas &>/dev/null; do
            sleep 5
          done
          echo "✅ Secret found"

          POSTGRESQL_USER=$(oc get secret maas-postgresql-credentials \
            -n external-db-maas \
            -o jsonpath='{.data.POSTGRESQL_USER}' | base64 -d)
          POSTGRESQL_PASSWORD=$(oc get secret maas-postgresql-credentials \
            -n external-db-maas \
            -o jsonpath='{.data.POSTGRESQL_PASSWORD}' | base64 -d)
          POSTGRESQL_DATABASE=$(oc get secret maas-postgresql-credentials \
            -n external-db-maas \
            -o jsonpath='{.data.POSTGRESQL_DATABASE}' | base64 -d)

          HOSTNAME="postgresql.external-db-maas.svc.cluster.local"
          PORT="5432"

          DB_CONNECTION_URL="postgresql://${POSTGRESQL_USER}:${POSTGRESQL_PASSWORD}@${HOSTNAME}:${PORT}/${POSTGRESQL_DATABASE}?sslmode=require"

          echo "Creating maas-db-config secret in redhat-ods-applications..."
          oc create secret generic maas-db-config \
            -n redhat-ods-applications \
            --from-literal=DB_CONNECTION_URL="${DB_CONNECTION_URL}" \
            --dry-run=client -o yaml | oc apply -f -

          echo "✅ Secret maas-db-config created in redhat-ods-applications"
