apiVersion: v1
kind: Secret
metadata:
  annotations:
    # gitleaks:allow - Demo/lab environment placeholder credentials
    security.internal/credential-type: demo-placeholder
  name: llama-stack-secret
  namespace: llamastack
stringData:
  EMBEDDING_MODEL: granite-embedding
  EMBEDDING_PROVIDER_MODEL_ID: granite-embedding
  INFERENCE_MODEL: llamastack-model
  VLLM_API_TOKEN: not-required-auth-disabled
  VLLM_EMBEDDING_API_TOKEN: not-required-auth-disabled
  VLLM_EMBEDDING_MAX_TOKENS: "512"
  VLLM_EMBEDDING_TLS_VERIFY: "false"
  VLLM_EMBEDDING_URL: http://granite-embedding-predictor.llamastack.svc.cluster.local/v1
  VLLM_MAX_TOKENS: "20000"
  VLLM_TLS_VERIFY: "false"
  VLLM_URL: http://llamastack-model-predictor.llamastack.svc.cluster.local/v1
type: Opaque
