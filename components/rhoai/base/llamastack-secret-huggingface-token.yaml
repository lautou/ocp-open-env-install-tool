apiVersion: v1
kind: Secret
metadata:
  annotations:
    # gitleaks:allow - HuggingFace token placeholder for model download
    security.internal/credential-type: huggingface-placeholder
  name: huggingface-token
  namespace: llamastack
stringData:
  # gitleaks:allow - Replace with actual HuggingFace token for Llama model access
  # Get token from https://huggingface.co/settings/tokens with read access
  token: hf_REPLACE_WITH_YOUR_TOKEN
type: Opaque
