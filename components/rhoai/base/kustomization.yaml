apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../common
- cluster-crb-datascienceclusters-edit-gitops.yaml
- cluster-datasciencecluster-default-dsc.yaml
- edit-rhoai-dashboard-config.yaml
- cluster-namespace-redhat-ods-applications.yaml
- cluster-namespace-redhat-ods-operator.yaml
- openshift-ingress-gateway-maas-default-gateway.yaml
- redhat-ods-applications-hardwareprofile-gpus.yaml
- redhat-ods-applications-odhdashboardconfig-odh-dashboard-config.yaml
- redhat-ods-operator-operatorgroup-rhods-operator.yaml
- redhat-ods-operator-subscription-rhods-operator.yaml
replacements:
- source:
    fieldPath: data.rhoai
    kind: ConfigMap
    name: cluster-versions
  targets:
  - fieldPaths:
    - spec.channel
    select:
      kind: Subscription
      name: rhods-operator
