apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../common
- cluster-cr-edit-rhoai-dashboard-config.yaml
- cluster-crb-datascienceclusters-edit-gitops.yaml
- cluster-datasciencecluster-default-dsc.yaml
- cluster-namespace-external-llamastack-db.yaml
- cluster-namespace-llamastack.yaml
- cluster-namespace-redhat-ods-applications.yaml
- cluster-namespace-redhat-ods-operator.yaml
- external-llamastack-db-pvc-postgresql-data.yaml
- external-llamastack-db-secret-postgresql-credentials.yaml
- external-llamastack-db-service-postgresql.yaml
- external-llamastack-db-statefulset-postgresql.yaml
- llamastack-datascienceproject-llamastack.yaml
- llamastack-deployment-vllm-llama32-3b.yaml
- llamastack-secret-huggingface-token.yaml
- llamastack-service-vllm-llama32-3b.yaml
- openshift-ingress-gateway-maas-default-gateway.yaml
- redhat-ods-applications-hardwareprofile-gpus.yaml
- redhat-ods-applications-llamastackdistribution-llamastack-pgvector.yaml
- redhat-ods-applications-odhdashboardconfig-odh-dashboard-config.yaml
- redhat-ods-applications-rb-llamastack-use-scc.yaml
- redhat-ods-applications-secret-llamastack-db-credentials.yaml
- redhat-ods-operator-operatorgroup-rhods-operator.yaml
- redhat-ods-operator-subscription-rhods-operator.yaml
replacements:
- source:
    fieldPath: data.rhoai
    kind: ConfigMap
    name: cluster-versions
  targets:
