apiVersion: v1
kind: ConfigMap
metadata:
  name: pipeline-upload-script
  namespace: ai-generation-llm-rag
data:
  upload-pipeline.py: |
    #!/usr/bin/env python3
    """
    Idempotent pipeline uploader for RHOAI Data Science Pipelines.

    Uploads pipeline definition to DSPA using KFP SDK with version-based idempotency.
    Creates new pipeline version if content changes, skips if identical version exists.
    """
    import kfp
    import hashlib
    import sys
    from pathlib import Path

    # Configuration
    DSPA_HOST = "https://ds-pipeline-pipelines.ai-generation-llm-rag.svc:8443"
    PIPELINE_NAME = "docling-standard-convert"
    PIPELINE_FILE = "/pipelines/pipeline.yaml"

    def calculate_pipeline_hash(filepath):
        """Calculate SHA256 hash of pipeline definition for idempotency check"""
        with open(filepath, 'rb') as f:
            return hashlib.sha256(f.read()).hexdigest()[:12]

    def main():
        # Verify pipeline file exists
        pipeline_path = Path(PIPELINE_FILE)
        if not pipeline_path.exists():
            print(f"ERROR: Pipeline file not found: {PIPELINE_FILE}")
            sys.exit(1)

        # Calculate pipeline hash for version naming
        pipeline_hash = calculate_pipeline_hash(PIPELINE_FILE)
        version_name = f"v-{pipeline_hash}"

        print(f"Pipeline: {PIPELINE_NAME}")
        print(f"Version: {version_name}")
        print(f"DSPA: {DSPA_HOST}")

        # Initialize KFP client (SSL verification disabled for internal cluster service)
        client = kfp.Client(host=DSPA_HOST, verify_ssl=False)

        # Check if pipeline exists
        try:
            pipeline_id = client.get_pipeline_id(PIPELINE_NAME)
            print(f"✓ Pipeline '{PIPELINE_NAME}' exists (ID: {pipeline_id})")

            # Check if this version already exists
            try:
                versions = client.list_pipeline_versions(pipeline_id, page_size=100)

                if versions and versions.versions:
                    existing_versions = [v.name for v in versions.versions]
                    print(f"  Found {len(existing_versions)} existing version(s)")

                    if version_name in existing_versions:
                        print(f"✓ Version '{version_name}' already exists - skipping upload (idempotent)")
                        print("Pipeline is up to date.")
                        sys.exit(0)

                # Upload as new version
                print(f"→ Uploading new version: {version_name}")
                client.upload_pipeline_version(
                    pipeline_package_path=PIPELINE_FILE,
                    pipeline_id=pipeline_id,
                    pipeline_version_name=version_name,
                    description=f"Uploaded from GitOps (hash: {pipeline_hash})"
                )
                print(f"✓ Version '{version_name}' uploaded successfully")

            except Exception as e:
                print(f"ERROR listing/uploading pipeline versions: {e}")
                sys.exit(1)

        except Exception:
            # Pipeline doesn't exist - create it
            print(f"→ Pipeline '{PIPELINE_NAME}' not found - creating new pipeline")
            try:
                uploaded_pipeline = client.upload_pipeline(
                    pipeline_package_path=PIPELINE_FILE,
                    pipeline_name=PIPELINE_NAME,
                    description="Docling standard convert pipeline with RH-supported images and GPU acceleration"
                )
                print(f"✓ Pipeline '{PIPELINE_NAME}' created successfully")
                print(f"  Pipeline ID: {uploaded_pipeline.pipeline_id}")

            except Exception as e:
                print(f"ERROR creating pipeline: {e}")
                sys.exit(1)

        print("Pipeline upload completed successfully")

    if __name__ == "__main__":
        main()
