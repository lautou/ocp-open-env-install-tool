    security.internal/credential-type: demo-placeholder
  name: llamastack-db-credentials
  namespace: redhat-ods-applications
stringData:
  # gitleaks:allow - Demo/lab environment placeholder credentials (references external-llamastack-db)
  POSTGRES_DB: llamastackdb
  POSTGRES_PASSWORD: changeme-demo-only
  POSTGRES_USER: llamastack
type: Opaque
