apiVersion: batch/v1
kind: Job
metadata:
  annotations:
    argocd.argoproj.io/sync-options: Force=true
  name: configure-dashboard
  namespace: openshift-gitops
spec:
  template:
    metadata:
      name: configure-dashboard
    spec:
      containers:
        - name: configure-dashboard
          image: registry.redhat.io/openshift4/ose-cli:latest
          command:
            - /bin/bash
            - '-c'
            - |
              set -e

              echo "Waiting for odh-dashboard-config to exist..."
              while ! oc get odhdashboardconfig odh-dashboard-config -n redhat-ods-applications &>/dev/null; do
                echo "Waiting for odh-dashboard-config..."
                sleep 5
              done

              echo "Configuring dashboard with genAiStudio and modelAsService..."
              oc patch odhdashboardconfig odh-dashboard-config -n redhat-ods-applications --type merge -p '
              {
                "spec": {
                  "dashboardConfig": {
                    "genAiStudio": true,
                    "modelAsService": true
                  }
                }
              }'

              echo "Dashboard configuration updated successfully!"
      nodeSelector:
        node-role.kubernetes.io/infra: ""
      restartPolicy: Never
      serviceAccountName: openshift-gitops-argocd-application-controller
      tolerations:
        - key: node-role.kubernetes.io/infra
          operator: Exists
