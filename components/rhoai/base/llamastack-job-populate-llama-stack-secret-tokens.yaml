apiVersion: batch/v1
kind: Job
metadata:
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
  name: populate-llama-stack-secret-tokens
  namespace: llamastack
spec:
  backoffLimit: 3
  template:
    metadata:
      name: populate-llama-stack-secret-tokens
    spec:
      containers:
      - command:
        - /bin/bash
        - -c
        - |
          set -e
          echo "Extracting service account tokens..."

          # Get llamastack-model SA token
          LLAMASTACK_TOKEN=$(oc get secret default-llamastack-model-sa -n llamastack -o jsonpath='{.data.token}' | base64 -d)

          # Get granite-embedding SA token
          GRANITE_TOKEN=$(oc get secret granite-embedding-sa-token -n llamastack -o jsonpath='{.data.token}' | base64 -d)

          echo "Patching llama-stack-secret with actual tokens..."

          # Patch the secret with real tokens
          oc patch secret llama-stack-secret -n llamastack --type=json -p='[
            {"op": "replace", "path": "/data/VLLM_API_TOKEN", "value": "'$(echo -n "$LLAMASTACK_TOKEN" | base64 -w0)'"},
            {"op": "replace", "path": "/data/VLLM_EMBEDDING_API_TOKEN", "value": "'$(echo -n "$GRANITE_TOKEN" | base64 -w0)'"}
          ]'

          echo "Successfully populated service account tokens into llama-stack-secret"
        image: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
        imagePullPolicy: IfNotPresent
        name: populate-tokens
      restartPolicy: Never
      serviceAccountName: openshift-gitops-argocd-application-controller
