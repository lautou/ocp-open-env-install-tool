apiVersion: batch/v1
kind: Job
metadata:
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: '10'
  name: create-alert-silences
  namespace: openshift-gitops
spec:
  backoffLimit: 3
  template:
    metadata:
      name: create-alert-silences
    spec:
      serviceAccountName: create-alert-silences
      restartPolicy: OnFailure
      containers:
      - command:
        - /bin/bash
        - -c
        - |
          set -e

          echo "================================================"
          echo "Creating Alertmanager Silences for Known Bugs"
          echo "================================================"
          echo ""

          # Wait for Alertmanager StatefulSet to be ready
          echo "Waiting for Alertmanager StatefulSet to be ready..."
          DESIRED_REPLICAS=$(oc get statefulset alertmanager-main -n openshift-monitoring -o jsonpath='{.spec.replicas}')
          echo "Alertmanager desired replicas: $DESIRED_REPLICAS"

          for i in {1..60}; do
            READY_REPLICAS=$(oc get statefulset alertmanager-main -n openshift-monitoring -o jsonpath='{.status.readyReplicas}')
            if [ "$READY_REPLICAS" = "$DESIRED_REPLICAS" ] && [ "$READY_REPLICAS" != "" ]; then
              echo "✅ Alertmanager StatefulSet ready ($READY_REPLICAS/$DESIRED_REPLICAS)"
              break
            fi
            echo "Waiting... ($i/60) - Ready: $READY_REPLICAS/$DESIRED_REPLICAS"
            sleep 5
          done

          # Wait for Alertmanager pods to be fully ready
          echo "Waiting for Alertmanager pods to be Running and Ready..."
          for i in {1..30}; do
            READY_PODS=$(oc get pods -n openshift-monitoring -l app.kubernetes.io/name=alertmanager --field-selector=status.phase=Running -o json | grep -c '"ready":true' || echo 0)
            if [ "$READY_PODS" -ge "$DESIRED_REPLICAS" ]; then
              echo "✅ Alertmanager pods ready ($READY_PODS/$DESIRED_REPLICAS)"
              break
            fi
            echo "Waiting for pods... ($i/30) - Ready: $READY_PODS/$DESIRED_REPLICAS"
            sleep 5
          done

          # Additional wait for Alertmanager API to be stable (critical for newly started pods)
          echo "Waiting additional 30 seconds for Alertmanager API to stabilize..."
          sleep 30
          echo "✅ Alertmanager should be fully initialized"

          # Function to create silence with retry and verification
          create_silence() {
            local name=$1
            local payload=$2
            local max_retries=3

            echo ""
            echo "Creating silence: $name"

            for attempt in $(seq 1 $max_retries); do
              echo "  Attempt $attempt/$max_retries..."

              # Port-forward to Alertmanager (run in background)
              oc port-forward -n openshift-monitoring alertmanager-main-0 9093:9093 >/dev/null 2>&1 &
              PF_PID=$!
              sleep 3

              # Create silence and check HTTP response
              HTTP_CODE=$(curl -s -w "%{http_code}" -o /tmp/silence_response.json \
                -X POST -H "Content-Type: application/json" \
                --data "$payload" \
                http://localhost:9093/api/v2/silences 2>/dev/null)

              # Extract silence ID using grep/sed (no jq needed)
              SILENCE_ID=$(grep -o '"silenceID":"[^"]*"' /tmp/silence_response.json 2>/dev/null | sed 's/"silenceID":"\(.*\)"/\1/' || echo "")

              # Verify silence was created by querying API
              if [ "$HTTP_CODE" = "200" ] && [ -n "$SILENCE_ID" ]; then
                # Wait a moment for silence to be indexed
                sleep 2

                # Verify silence exists
                VERIFY_CODE=$(curl -s -w "%{http_code}" -o /tmp/verify_silence.json \
                  "http://localhost:9093/api/v2/silence/$SILENCE_ID" 2>/dev/null)

                if [ "$VERIFY_CODE" = "200" ]; then
                  echo "  ✅ Silence created and verified: $SILENCE_ID"
                  kill $PF_PID 2>/dev/null || true
                  return 0
                else
                  echo "  ⚠️  Created but verification failed (HTTP $VERIFY_CODE)"
                fi
              else
                echo "  ⚠️  Creation failed (HTTP $HTTP_CODE)"
                if [ -f /tmp/silence_response.json ]; then
                  cat /tmp/silence_response.json
                fi
              fi

              # Kill port-forward before retry
              kill $PF_PID 2>/dev/null || true

              if [ $attempt -lt $max_retries ]; then
                echo "  Retrying in 5 seconds..."
                sleep 5
              fi
            done

            echo "  ❌ Failed to create silence after $max_retries attempts"
            return 1
          }

          # Calculate timestamps
          START_TIME=$(date -u +%Y-%m-%dT%H:%M:%S.000Z)
          END_TIME=$(date -u -d '+10 years' +%Y-%m-%dT%H:%M:%S.000Z)

          # 1. mlflow-operator TargetDown silence
          MLFLOW_PAYLOAD=$(cat <<EOF
          {
            "matchers": [
              {"name": "alertname", "value": "TargetDown", "isRegex": false, "isEqual": true},
              {"name": "service", "value": "mlflow-operator-controller-manager-metrics-service", "isRegex": false, "isEqual": true},
              {"name": "namespace", "value": "redhat-ods-applications", "isRegex": false, "isEqual": true}
            ],
            "startsAt": "$START_TIME",
            "endsAt": "$END_TIME",
            "createdBy": "argocd-automation",
            "comment": "Known bug: mlflow-operator ServiceMonitor targets non-existent metrics endpoint (JIRA: RHOAIENG-54791) - See KNOWN_BUGS.md"
          }
          EOF
          )
          create_silence "mlflow-operator TargetDown" "$MLFLOW_PAYLOAD"

          # 2. llama-stack PodDisruptionBudgetAtLimit silence
          LLAMA_PAYLOAD=$(cat <<EOF
          {
            "matchers": [
              {"name": "alertname", "value": "PodDisruptionBudgetAtLimit", "isRegex": false, "isEqual": true},
              {"name": "poddisruptionbudget", "value": "llama-stack-k8s-operator-controller-manager-pdb", "isRegex": false, "isEqual": true},
              {"name": "namespace", "value": "redhat-ods-applications", "isRegex": false, "isEqual": true}
            ],
            "startsAt": "$START_TIME",
            "endsAt": "$END_TIME",
            "createdBy": "argocd-automation",
            "comment": "Known bug: llama-stack PDB with 1 replica (JIRA: RHAIENG-3783) - See KNOWN_BUGS.md"
          }
          EOF
          )
          create_silence "llama-stack PodDisruptionBudgetAtLimit" "$LLAMA_PAYLOAD"

          # 3. NooBaa database PodDisruptionBudgetAtLimit silence
          NOOBAA_PAYLOAD=$(cat <<EOF
          {
            "matchers": [
              {"name": "alertname", "value": "PodDisruptionBudgetAtLimit", "isRegex": false, "isEqual": true},
              {"name": "poddisruptionbudget", "value": "noobaa-db-pg-cluster-primary", "isRegex": false, "isEqual": true},
              {"name": "namespace", "value": "openshift-storage", "isRegex": false, "isEqual": true}
            ],
            "startsAt": "$START_TIME",
            "endsAt": "$END_TIME",
            "createdBy": "argocd-automation",
            "comment": "Known bug: NooBaa database PDB with single replica (JIRA: DFBUGS-5294) - See KNOWN_BUGS.md"
          }
          EOF
          )
          create_silence "NooBaa PodDisruptionBudgetAtLimit" "$NOOBAA_PAYLOAD"

          # 4. Apicurio Registry UI PodDisruptionBudgetAtLimit silence
          APICURIO_PAYLOAD=$(cat <<EOF
          {
            "matchers": [
              {"name": "alertname", "value": "PodDisruptionBudgetAtLimit", "isRegex": false, "isEqual": true},
              {"name": "poddisruptionbudget", "value": "apicurio-studio-ui-poddisruptionbudget", "isRegex": false, "isEqual": true},
              {"name": "namespace", "value": "apicurio", "isRegex": false, "isEqual": true}
            ],
            "startsAt": "$START_TIME",
            "endsAt": "$END_TIME",
            "createdBy": "argocd-automation",
            "comment": "Known bug: Apicurio UI PDB with single replica (JIRA: APICURIO-24) - See KNOWN_BUGS.md"
          }
          EOF
          )
          create_silence "Apicurio PodDisruptionBudgetAtLimit" "$APICURIO_PAYLOAD"

          # 5. Insights recommendation - Kueue webhook timeout
          INSIGHTS_WEBHOOK_PAYLOAD=$(cat <<EOF
          {
            "matchers": [
              {"name": "alertname", "value": "InsightsRecommendationActive", "isRegex": false, "isEqual": true},
              {"name": "description", "value": ".*webhook.*timeout.*13s.*", "isRegex": true, "isEqual": true}
            ],
            "startsAt": "$START_TIME",
            "endsAt": "$END_TIME",
            "createdBy": "argocd-automation",
            "comment": "Known bug: Kueue webhook timeout recommendation (JIRA: OCPKUEUE-578) - See KNOWN_BUGS.md"
          }
          EOF
          )
          create_silence "Insights webhook timeout recommendation" "$INSIGHTS_WEBHOOK_PAYLOAD"

          # 6. Insights recommendation - config location migration
          INSIGHTS_CONFIG_PAYLOAD=$(cat <<EOF
          {
            "matchers": [
              {"name": "alertname", "value": "InsightsRecommendationActive", "isRegex": false, "isEqual": true},
              {"name": "description", "value": ".*config.*migrated.*secret.*configmap.*", "isRegex": true, "isEqual": true}
            ],
            "startsAt": "$START_TIME",
            "endsAt": "$END_TIME",
            "createdBy": "argocd-automation",
            "comment": "Known bug: Insights config migration recommendation - See KNOWN_BUGS.md"
          }
          EOF
          )
          create_silence "Insights config migration recommendation" "$INSIGHTS_CONFIG_PAYLOAD"

          # 7. Insights recommendation - MachineConfigPool maxUnavailable
          INSIGHTS_MCP_PAYLOAD=$(cat <<EOF
          {
            "matchers": [
              {"name": "alertname", "value": "InsightsRecommendationActive", "isRegex": false, "isEqual": true},
              {"name": "description", "value": ".*MachineConfigPool.*unavailableMachineCount.*maxUnavailable.*", "isRegex": true, "isEqual": true}
            ],
            "startsAt": "$START_TIME",
            "endsAt": "$END_TIME",
            "createdBy": "argocd-automation",
            "comment": "Known bug: MachineConfigPool maxUnavailable false-positive - See KNOWN_BUGS.md"
          }
          EOF
          )
          create_silence "Insights MachineConfigPool maxUnavailable recommendation" "$INSIGHTS_MCP_PAYLOAD"

          # 8. Kuadrant istio-pod-monitor TargetDown
          ISTIO_PODMONITOR_PAYLOAD=$(cat <<EOF
          {
            "matchers": [
              {"name": "alertname", "value": "TargetDown", "isRegex": false, "isEqual": true},
              {"name": "job", "value": ".*/istio-pod-monitor", "isRegex": true, "isEqual": true}
            ],
            "startsAt": "$START_TIME",
            "endsAt": "$END_TIME",
            "createdBy": "argocd-automation",
            "comment": "Known bug: Kuadrant PodMonitor empty namespaceSelector (JIRA: CONNLINK-911) - See KNOWN_BUGS.md"
          }
          EOF
          )
          create_silence "Kuadrant istio-pod-monitor TargetDown" "$ISTIO_PODMONITOR_PAYLOAD"

          echo ""
          echo "================================================"
          echo "Verifying all silences are active..."
          echo "================================================"

          # Final verification: count active silences
          oc port-forward -n openshift-monitoring alertmanager-main-0 9093:9093 >/dev/null 2>&1 &
          PF_PID=$!
          sleep 3

          SILENCE_COUNT=$(curl -s http://localhost:9093/api/v2/silences 2>/dev/null | grep -o '"status":{"state":"active"' | wc -l || echo 0)

          kill $PF_PID 2>/dev/null || true

          echo "Active silences: $SILENCE_COUNT"

          if [ "$SILENCE_COUNT" -ge 8 ]; then
            echo "✅ SUCCESS: All alert silences created and verified"
            exit 0
          else
            echo "❌ ERROR: Expected 8+ silences, found $SILENCE_COUNT"
            exit 1
          fi
        image: registry.redhat.io/openshift4/ose-cli:latest
        name: create-silences
