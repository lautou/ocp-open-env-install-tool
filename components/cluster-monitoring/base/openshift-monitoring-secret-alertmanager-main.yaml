apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-main
  namespace: openshift-monitoring
type: Opaque
stringData:
  alertmanager.yaml: |
    global:
      http_config:
        proxy_from_environment: true

    inhibit_rules:
      - equal:
          - namespace
          - alertname
        source_matchers:
          - severity = critical
        target_matchers:
          - severity =~ warning|info
      - equal:
          - namespace
          - alertname
        source_matchers:
          - severity = warning
        target_matchers:
          - severity = info

    receivers:
      - name: Default
      - name: Watchdog
      - name: Critical
      - name: 'null'  # Black hole receiver for silenced alerts

    route:
      group_by:
        - namespace
      group_interval: 5m
      group_wait: 30s
      receiver: Default
      repeat_interval: 12h
      routes:
        # ===== SILENCED ALERTS FOR KNOWN BUGS - START =====
        # See KNOWN_BUGS.md for details on each silenced alert

        # EXPECTED: KubeMemoryOvercommit due to large LLM model serving
        # Context: Cluster runs a 128B LLM (Mistral Medium 3.5) on a single p4d.24xlarge
        #          GPU node requiring 320Gi memory request. This inherently overcommits
        #          cluster memory since no other node can absorb the workload on node failure.
        #          This is by design for a GPU lab/demo environment, not a fixable condition.
        # Scope: Only fires when large LLM (320Gi+) is actively deployed on GPU node.
        - matchers:
            - alertname = KubeMemoryOvercommit
            - namespace = kube-system
            - severity = warning
          receiver: 'null'
          continue: false

        # BUG: NooBaa database PodDisruptionBudgetAtLimit
        # Component: OpenShift Data Foundation (ODF) - NooBaa
        # Issue: Single-replica PostgreSQL PDB with minAvailable:1 = 0 disruptions allowed
        # Impact: False-positive PodDisruptionBudgetAtLimit alerts
        # JIRA: DFBUGS-5294 (https://redhat.atlassian.net/browse/DFBUGS-5294)
        - matchers:
            - alertname = PodDisruptionBudgetAtLimit
            - poddisruptionbudget = noobaa-db-pg-cluster-primary
            - namespace = openshift-storage
          receiver: 'null'
          continue: false

        # BUG: Apicurio Registry UI PodDisruptionBudgetAtLimit
        # Component: Apicurio Registry - UI Component
        # Issue: Single-replica UI PDB with minAvailable:1 = 0 disruptions allowed
        # Impact: False-positive PodDisruptionBudgetAtLimit alerts
        # JIRA: APICURIO-24 (https://issues.redhat.com/browse/APICURIO-24)
        - matchers:
            - alertname = PodDisruptionBudgetAtLimit
            - poddisruptionbudget = apicurio-studio-ui-poddisruptionbudget
            - namespace = apicurio
          receiver: 'null'
          continue: false

        # BUG: Insights recommendation - Kueue webhook timeout
        # Component: Insights Operator
        # Issue: Kueue webhooks require extended timeout for complex validations
        # Impact: False-positive Insights recommendation alert
        # JIRA: OCPKUEUE-578
        # Note: disabled_recommendations in support Secret does not suppress the alert
        - matchers:
            - alertname = InsightsRecommendationActive
            - description =~ .*webhook.*timeout.*13s.*
          receiver: 'null'
          continue: false

        # BUG: Insights recommendation - config location migration
        # Component: Insights Operator
        # Issue: OCP 4.20 still uses Secret (ConfigMap not supported without feature gate)
        # Impact: False-positive Insights recommendation alert
        # Note: disabled_recommendations in support Secret does not suppress the alert
        - matchers:
            - alertname = InsightsRecommendationActive
            - description =~ .*config.*migrated.*secret.*configmap.*
          receiver: 'null'
          continue: false

        # BUG: Insights recommendation - MachineConfigPool maxUnavailable
        # Component: Machine Config Operator
        # Issue: False-positive when maxUnavailable is null (defaults to 1)
        # Impact: False-positive moderate risk recommendation
        # Note: disabled_recommendations in support Secret does not suppress the alert
        - matchers:
            - alertname = InsightsRecommendationActive
            - description =~ .*MachineConfigPool.*unavailableMachineCount.*maxUnavailable.*
          receiver: 'null'
          continue: false

        # BUG: Kuadrant istio-pod-monitor TargetDown
        # Component: Red Hat Connectivity Link (RHCL) - Kuadrant Operator
        # Issue: PodMonitor created with empty namespaceSelector attempts cross-namespace scraping
        # Impact: User-workload Prometheus discovers cluster-monitoring namespace targets but cannot scrape them
        # JIRA: CONNLINK-911
        - matchers:
            - alertname = TargetDown
            - job =~ .*/istio-pod-monitor
          receiver: 'null'
          continue: false

        # Add additional silenced alerts here with similar documentation

        # ===== SILENCED ALERTS FOR KNOWN BUGS - END =====

        # Platform default routes
        - matchers:
            - alertname = Watchdog
          receiver: Watchdog
        - matchers:
            - severity = critical
          receiver: Critical
