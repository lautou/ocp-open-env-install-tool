apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-main
  namespace: openshift-monitoring
type: Opaque
stringData:
  alertmanager.yaml: |
    global:
      http_config:
        proxy_from_environment: true

    inhibit_rules:
      - equal:
          - namespace
          - alertname
        source_matchers:
          - severity = critical
        target_matchers:
          - severity =~ warning|info
      - equal:
          - namespace
          - alertname
        source_matchers:
          - severity = warning
        target_matchers:
          - severity = info

    receivers:
      - name: Default
      - name: Watchdog
      - name: Critical
      - name: 'null'  # Black hole receiver for silenced alerts

    route:
      group_by:
        - namespace
      group_interval: 5m
      group_wait: 30s
      receiver: Default
      repeat_interval: 12h
      routes:
        # ===== SILENCED ALERTS FOR KNOWN BUGS - START =====
        # See KNOWN_BUGS.md for details on each silenced alert

        # BUG: mlflow-operator broken metrics endpoint
        # Component: Red Hat OpenShift AI (RHOAI) - MLflow Operator
        # Issue: ServiceMonitor targets non-existent metrics endpoint
        # Impact: False-positive TargetDown alerts
        # Status: Upstream bug in mlflow-operator v2.0.0
        - matchers:
            - alertname = TargetDown
            - service = mlflow-operator-controller-manager-metrics-service
            - namespace = redhat-ods-applications
          receiver: 'null'
          continue: false

        # Add additional silenced alerts here with similar documentation

        # ===== SILENCED ALERTS FOR KNOWN BUGS - END =====

        # Platform default routes
        - matchers:
            - alertname = Watchdog
          receiver: Watchdog
        - matchers:
            - severity = critical
          receiver: Critical
