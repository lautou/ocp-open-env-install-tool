apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-main
  namespace: openshift-monitoring
type: Opaque
stringData:
  alertmanager.yaml: |
    global:
      http_config:
        proxy_from_environment: true

    inhibit_rules:
      - equal:
          - namespace
          - alertname
        source_matchers:
          - severity = critical
        target_matchers:
          - severity =~ warning|info
      - equal:
          - namespace
          - alertname
        source_matchers:
          - severity = warning
        target_matchers:
          - severity = info

    receivers:
      - name: Default
      - name: Watchdog
      - name: Critical
      - name: 'null'  # Black hole receiver for silenced alerts

    route:
      group_by:
        - namespace
      group_interval: 5m
      group_wait: 30s
      receiver: Default
      repeat_interval: 12h
      routes:
        # ===== SILENCED ALERTS FOR KNOWN BUGS - START =====
        # See KNOWN_BUGS.md for details on each silenced alert

        # BUG: mlflow-operator broken metrics endpoint
        # Component: Red Hat OpenShift AI (RHOAI) - MLflow Operator
        # Issue: ServiceMonitor targets non-existent metrics endpoint
        # Impact: False-positive TargetDown alerts
        # JIRA: RHOAIENG-54791 (https://redhat.atlassian.net/browse/RHOAIENG-54791)
        - matchers:
            - alertname = TargetDown
            - service = mlflow-operator-controller-manager-metrics-service
            - namespace = redhat-ods-applications
          receiver: 'null'
          continue: false

        # BUG: llama-stack-k8s-operator PodDisruptionBudgetAtLimit
        # Component: Red Hat OpenShift AI (RHOAI) - Llama Stack Operator
        # Issue: PDB configured with 0 allowed disruptions triggering false alert
        # Impact: False-positive PodDisruptionBudgetAtLimit alerts
        # JIRA: RHAIENG-3783 (https://redhat.atlassian.net/browse/RHAIENG-3783)
        - matchers:
            - alertname = PodDisruptionBudgetAtLimit
            - poddisruptionbudget = llama-stack-k8s-operator-controller-manager-pdb
            - namespace = redhat-ods-applications
          receiver: 'null'
          continue: false

        # BUG: NooBaa database PodDisruptionBudgetAtLimit
        # Component: OpenShift Data Foundation (ODF) - NooBaa
        # Issue: Single-replica PostgreSQL PDB with minAvailable:1 = 0 disruptions allowed
        # Impact: False-positive PodDisruptionBudgetAtLimit alerts
        # JIRA: DFBUGS-5294 (https://redhat.atlassian.net/browse/DFBUGS-5294)
        - matchers:
            - alertname = PodDisruptionBudgetAtLimit
            - poddisruptionbudget = noobaa-db-pg-cluster-primary
            - namespace = openshift-storage
          receiver: 'null'
          continue: false

        # BUG: Insights recommendation - Kueue webhook timeout
        # Component: Insights Operator
        # Issue: Kueue webhooks require extended timeout for complex validations
        # Impact: False-positive Insights recommendation alert
        # JIRA: OCPKUEUE-578
        # Note: disabled_recommendations in support Secret does not suppress the alert
        - matchers:
            - alertname = InsightsRecommendationActive
            - description =~ .*webhook.*timeout.*13s.*
          receiver: 'null'
          continue: false

        # BUG: Insights recommendation - config location migration
        # Component: Insights Operator
        # Issue: OCP 4.20 still uses Secret (ConfigMap not supported without feature gate)
        # Impact: False-positive Insights recommendation alert
        # Note: disabled_recommendations in support Secret does not suppress the alert
        - matchers:
            - alertname = InsightsRecommendationActive
            - description =~ .*config.*migrated.*secret.*configmap.*
          receiver: 'null'
          continue: false

        # BUG: Kuadrant istio-pod-monitor TargetDown
        # Component: Red Hat Connectivity Link (RHCL) - Kuadrant Operator
        # Issue: PodMonitor created with empty namespaceSelector attempts cross-namespace scraping
        # Impact: User-workload Prometheus discovers cluster-monitoring namespace targets but cannot scrape them
        # JIRA: CONNLINK-911
        - matchers:
            - alertname = TargetDown
            - job =~ .*/istio-pod-monitor
          receiver: 'null'
          continue: false

        # Add additional silenced alerts here with similar documentation

        # ===== SILENCED ALERTS FOR KNOWN BUGS - END =====

        # Platform default routes
        - matchers:
            - alertname = Watchdog
          receiver: Watchdog
        - matchers:
            - severity = critical
          receiver: Critical
