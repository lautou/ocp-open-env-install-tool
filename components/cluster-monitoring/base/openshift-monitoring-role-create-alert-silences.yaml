apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: create-alert-silences
  namespace: openshift-monitoring
rules:
- apiGroups:
  - ""
  resources:
  - pods
  - pods/portforward
  verbs:
  - get
  - list
  - create
- apiGroups:
  - apps
  resources:
  - statefulsets
  verbs:
  - get
  - list
