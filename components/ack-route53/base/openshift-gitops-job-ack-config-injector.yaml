apiVersion: batch/v1
kind: Job
metadata:
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-options: Force=true
    argocd.argoproj.io/sync-wave: "3"
  name: ack-config-injector
  namespace: openshift-gitops
spec:
  template:
    metadata:
      name: ack-config-injector
    spec:
      containers:
        - command:
            - /bin/bash
            - -c
            - |
              #!/bin/bash
              set -e

              echo "Waiting for aws-creds secret in kube-system..."
              while ! oc get secret aws-creds -n kube-system &>/dev/null; do
                echo "Waiting for secret aws-creds in namespace kube-system."
                sleep 5
              done

              echo "Extracting AWS credentials from kube-system/aws-creds..."
              AWS_ACCESS_KEY_ID=$(oc extract secret/aws-creds -n kube-system --keys aws_access_key_id --to -)
              AWS_SECRET_ACCESS_KEY=$(oc extract secret/aws-creds -n kube-system --keys aws_secret_access_key --to -)

              echo "Creating ack-route53-user-secrets Secret..."
              cat <<EOF | oc apply -f -
              apiVersion: v1
              kind: Secret
              metadata:
                name: ack-route53-user-secrets
                namespace: ack-system
              type: Opaque
              stringData:
                AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID}"
                AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY}"
              EOF

              echo "Secret creation completed successfully!"
          image: registry.redhat.io/openshift4/ose-cli:latest
          name: config-injector
      nodeSelector:
        node-role.kubernetes.io/infra: ""
      restartPolicy: Never
      serviceAccountName: ack-config-operator
      tolerations:
        - key: node-role.kubernetes.io/infra
          operator: Exists
