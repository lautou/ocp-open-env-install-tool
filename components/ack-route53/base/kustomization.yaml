apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../common
  - ack-system-operatorgroup-ack-route53-operator.yaml
  - ack-system-subscription-ack-route53-controller.yaml
  - cluster-namespace-ack-system.yaml
  - openshift-gitops-job-ack-config-injector.yaml

replacements:
  - source:
      kind: ConfigMap
      name: cluster-versions
      fieldPath: data.ack-route53
    targets:
      - select:
          kind: Subscription
          name: ack-route53-controller
        fieldPaths:
          - spec.channel
