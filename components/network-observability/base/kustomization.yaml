apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../common
- cluster-crb-netobserv-flowcollector-edit.yaml
- cluster-flowcollector-cluster.yaml
- cluster-namespace-openshift-netobserv-operator.yaml
- openshift-netobserv-operator-operatorgroup-openshift-netobserv-operator.yaml
- openshift-netobserv-operator-subscription-netobserv-operator.yaml
replacements:
- source:
    fieldPath: data.network-observability
    kind: ConfigMap
    name: cluster-versions
  targets:
  - fieldPaths:
    - spec.channel
    select:
      kind: Subscription
      name: openshift-netobserv-operator
