apiVersion: nvidia.com/v1
kind: ClusterPolicy
metadata:
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
  name: gpu-cluster-policy
spec:
  daemonsets: {}
  dcgm: {}
  dcgmExporter: {}
  devicePlugin: {}
  driver:
    repository: nvcr.io/nvidia
    image: driver
    version: "550.90.07"
  gfd: {}
  nodeStatusExporter:
    enabled: true
  operator:
    defaultRuntime: crio
    use_ocp_driver_toolkit: true
  toolkit: {}
