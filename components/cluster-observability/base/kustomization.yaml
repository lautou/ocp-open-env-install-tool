apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../common
  - cluster-crb-uiplugins.observability.openshift.io-v1alpha1-edit-openshift-gitops-openshift-gitops-argocd-application-controller.yaml
  - cluster-uiplugin-logging.yaml
  - cluster-uiplugin-monitoring.yaml
  - openshift-observability-operator-namespace.yaml
  - openshift-observability-operator-operatorgroup-observability-operator.yaml
  - openshift-observability-operator-subscription-cluster-observability-operator.yaml

replacements:
  - source:
      kind: ConfigMap
      name: cluster-versions
      fieldPath: data.cluster-observability
    targets:
      - select:
          kind: Subscription
          name: cluster-observability-operator
        fieldPaths:
          - spec.channel
