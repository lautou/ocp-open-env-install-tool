apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../gitops-bases/acm/managed
- ../../gitops-bases/core
- ../../gitops-bases/devops/default
- ../../gitops-bases/logging/pico
- ../../gitops-bases/netobserv/default
- ../../gitops-bases/storage/mcg-only

# Git repository configuration (injected into ApplicationSets)
configMapGenerator:
- name: gitops-repo-config
  literals:
  - repoURL=https://github.com/lautou/ocp-open-env-install-tool.git

# Replace hardcoded Git URLs in all ApplicationSets
replacements:
- source:
    kind: ConfigMap
    name: gitops-repo-config
    fieldPath: data.repoURL
  targets:
  - select:
      kind: ApplicationSet
    fieldPaths:
    - spec.template.spec.source.repoURL
