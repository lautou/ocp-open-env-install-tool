apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- cluster-appproject-ai-usecases.yaml
- uc-ai-generation-llm-rag.yaml
- ../../gitops-bases/ai
- ../../gitops-bases/core
- ../../gitops-bases/devops/ai
- ../../gitops-bases/logging/pico
- ../../gitops-bases/netobserv/default
- ../../gitops-bases/storage/mcg-only

# Git repository configuration (injected into ApplicationSets)
configMapGenerator:
- name: gitops-repo-config
  literals:
  - repoURL=https://github.com/lautou/ocp-open-env-install-tool.git

# Replace hardcoded Git URLs in all ApplicationSets and Applications
replacements:
- source:
    kind: ConfigMap
    name: gitops-repo-config
    fieldPath: data.repoURL
  targets:
  - select:
      kind: ApplicationSet
    fieldPaths:
    - spec.template.spec.source.repoURL
  - select:
      kind: Application
    fieldPaths:
    - spec.source.repoURL
