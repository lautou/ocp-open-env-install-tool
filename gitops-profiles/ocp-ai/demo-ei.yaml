apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  finalizers:
  - resources-finalizer.argocd.argoproj.io/background
  name: demo-ei
  namespace: openshift-gitops
spec:
  destination:
    server: https://kubernetes.default.svc
  ignoreDifferences:
  - group: ""
    jsonPointers:
    - /metadata/annotations
    kind: ConfigMap
    name: cluster-versions
  - group: serving.kserve.io
    jsonPointers:
    - /metadata/annotations/opendatahub.io~1hardware-profile-resource-version
    - /metadata/annotations/opendatahub.io~1connections
    - /metadata/finalizers
    kind: InferenceService
  - group: serving.kserve.io
    jsonPointers:
    - /metadata/annotations
    kind: ServingRuntime
  project: demo-ei
  source:
    path: components/demo-ei/overlays/default
    repoURL: https://github.com/lautou/ocp-open-env-install-tool.git
    targetRevision: demo-ei
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 10
