apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cluster-core-components
  namespace: openshift-gitops
spec:
  generators:
  - list:
      elements:
      - branch: master
        item: cert-manager
      - branch: master
        item: keycloak
      - branch: master
        item: cluster-autoscaler
      - branch: master
        item: cluster-images-registry
      - branch: master
        item: cluster-ingress
      - branch: master
        item: cluster-monitoring
      - branch: master
        item: cluster-network
      - branch: master
        item: cluster-oauth
      - branch: master
        item: cluster-observability
      - branch: master
        item: ack-route53
      - branch: master
        item: grafana
      - branch: master
        item: loki
      - branch: master
        item: nfd
      - branch: master
        item: openshift-builds
      - branch: master
        item: openshift-config
      - branch: master
        item: openshift-gitops-admin-config
      - branch: master
        item: openshift-operators
      - branch: master
        item: opentelemetry
      - branch: master
        item: tempo
      - branch: master
        item: user-workload-monitoring
  template:
    metadata:
      finalizers:
      - resources-finalizer.argocd.argoproj.io/background
      name: '{{item}}'
    spec:
      project: default
      source: !!python/object/apply:collections.OrderedDict
      - - - path
          - components/{{item}}/overlays/default
        - - repoURL
          - https://github.com/lautou/ocp-open-env-install-tool.git
        - - targetRevision
          - '{{branch}}'
      destination:
        server: https://kubernetes.default.svc
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        retry:
          limit: 10
      ignoreDifferences:
      - !!python/object/apply:collections.OrderedDict
        - - - group
            - ''
          - - jsonPointers
            - - /metadata/labels
              - /metadata/annotations
              - /metadata/ownerReferences
          - - kind
            - ConfigMap
          - - name
            - cluster-versions
      - !!python/object/apply:collections.OrderedDict
        - - - group
            - config.openshift.io
          - - jsonPointers
            - - /spec/clusterNetwork
              - /spec/serviceNetwork
              - /spec/networkType
              - /spec/externalIP
          - - kind
            - Network
          - - name
            - cluster
