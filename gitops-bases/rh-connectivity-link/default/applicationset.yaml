apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: rh-connectivity-link
  namespace: openshift-gitops
spec:
  generators:
  - list:
      elements:
      - branch: master
        item: rh-connectivity-link
  template:
    metadata:
      finalizers:
      - resources-finalizer.argocd.argoproj.io/background
      name: '{{item}}'
    spec:
      project: default
      source: !!python/object/apply:collections.OrderedDict
      - - - path
          - components/{{item}}/overlays/default
        - - repoURL
          - https://github.com/lautou/ocp-open-env-install-tool.git
        - - targetRevision
          - '{{branch}}'
      destination:
        server: https://kubernetes.default.svc
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        retry:
          limit: 10
      ignoreDifferences:
      - !!python/object/apply:collections.OrderedDict
        - - - group
            - ''
          - - jsonPointers
            - - /metadata/labels
              - /metadata/annotations
              - /metadata/ownerReferences
          - - kind
            - ConfigMap
          - - name
            - cluster-versions
