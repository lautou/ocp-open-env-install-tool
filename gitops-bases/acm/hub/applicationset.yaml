apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cluster-acm-hub
  namespace: openshift-gitops
spec:
  generators:
  - list:
      elements:
      - branch: master
        item: rhacm
  template:
    metadata:
      name: '{{item}}'
    spec:
      project: default
      source:
        path: components/{{item}}/overlays/hub
        repoURL: https://github.com/lautou/ocp-open-env-install-tool.git
        targetRevision: '{{branch}}'
      destination:
        server: https://kubernetes.default.svc
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        retry:
          limit: 10
      ignoreDifferences:
      - group: addon.open-cluster-management.io
        jsonPointers:
        - /spec/installStrategy
        kind: ClusterManagementAddOn
      - group:
        jsonPointers:
        - /metadata/labels
        - /metadata/annotations
        - /metadata/ownerReferences
        kind: ConfigMap
        name: cluster-versions
